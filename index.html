    function AddBookModal({ onClose, onAddBook, accent }) {
      const [tab, setTab] = useState("search");
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchErr, setSearchErr] = useState("");
      const [suggestions, setSuggestions] = useState([]);
      const [suggestLoading, setSuggestLoading] = useState(false);
      const [suggestOpen, setSuggestOpen] = useState(false);
      const blurTimer = useRef(null);
      const camInputCameraRef = useRef(null);
      const camInputGalleryRef = useRef(null);
      const cameraBlobUrlRef = useRef(null);

      const [scanning, setScanning] = useState(false);
      const [scanMiss, setScanMiss] = useState(false);
      const [cameraPreviewUrl, setCameraPreviewUrl] = useState("");
      const [cameraHits, setCameraHits] = useState([]);
      const [cameraStatus, setCameraStatus] = useState("");
      const [cameraErr, setCameraErr] = useState("");
      const [cameraSnippet, setCameraSnippet] = useState("");

      useEffect(() => {
        return () => {
          if (cameraBlobUrlRef.current) {
            URL.revokeObjectURL(cameraBlobUrlRef.current);
            cameraBlobUrlRef.current = null;
          }
        };
      }, []);

      useEffect(() => {
        if (tab !== "search") {
          setSuggestions([]);
          setSuggestOpen(false);
        }
        if (tab === "camera") {
          setCameraErr("");
          setCameraStatus("");
        }
      }, [tab]);

      /* Live-Vorschläge beim Tippen (kurz warten, damit die API nicht flutet) */
      useEffect(() => {
        if (tab !== "search") return;
        const q = query.trim();
        if (q.length < 2) {
          setSuggestions([]);
          setSuggestLoading(false);
          return;
        }
        setSuggestLoading(true);
        const ac = new AbortController();
        const t = setTimeout(async () => {
          try {
            const list = await searchOpenLibrary(q, 10, ac.signal, {
              resolveEditionWorkKeys: true,
              maxEditionLookups: 8,
            });
            setSuggestions(list.slice(0, 8));
          } catch (e) {
            if (e.name !== "AbortError") setSuggestions([]);
          } finally {
            setSuggestLoading(false);
          }
        }, 350);
        return () => { clearTimeout(t); ac.abort(); };
      }, [query, tab]);

      const handleSearch = async () => {
        if (!query.trim()) return;
        setSuggestOpen(false);
        setSearching(true);
        setSearchErr("");
        setResults([]);
        try {
          const list = await searchOpenLibrarySmart(query);
          await attachOpenLibraryWorkKeysToRows(list, null, Math.min(22, Math.max(list.length, 8)));
          setResults(list);
          if (list.length === 0) setSearchErr("Nichts gefunden – anderen Suchbegriff probieren.");
        } catch (e) {
          setSearchErr(e.message || "Suche fehlgeschlagen.");
          setResults([]);
        } finally {
          setSearching(false);
        }
      };

      const pickSuggestion = (b) => {
        setQuery(b.title);
        setResults([b]);
        setSuggestions([]);
        setSuggestOpen(false);
        setSearchErr("");
      };

      const releaseCameraPreview = () => {
        if (cameraBlobUrlRef.current) {
          URL.revokeObjectURL(cameraBlobUrlRef.current);
          cameraBlobUrlRef.current = null;
        }
        setCameraPreviewUrl("");
      };

      const onCameraInputChange = async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        ev.target.value = "";
        if (!file) return;
        const mimeOk = /^image\//i.test(String(file.type || ""));
        const nameOk = /\.(jpe?g|png|webp|gif|heic|heif|bmp)$/i.test(String(file.name || ""));
        if (!mimeOk && !nameOk) {
          setCameraErr("Bitte ein Bild auswählen (Foto, PNG, WebP …).");
          return;
        }
        setCameraErr("");
        setScanMiss(false);
        setCameraHits([]);
        setCameraSnippet("");
        setCameraStatus("");
        releaseCameraPreview();
        setScanning(true);
        try {
          const jpegBlob = await shrinkImageBlobForOCR(file, 1360, 0.88);
          const url = URL.createObjectURL(jpegBlob);
          cameraBlobUrlRef.current = url;
          setCameraPreviewUrl(url);
          const { list: hits, ocrSnippet } = await lookupBooksFromCoverPhoto(jpegBlob, (msg) => setCameraStatus(msg));
          setCameraSnippet(ocrSnippet || "");
          setCameraHits(hits || []);
          setScanMiss(!(hits && hits.length));
          if (!(hits && hits.length)) setCameraStatus("Kein Buch gefunden — anderes Bild (näher, heller, Titel gerade ausrichten).");
        } catch (x) {
          setCameraErr(x.message || String(x));
          setScanMiss(true);
        } finally {
          setScanning(false);
        }
      };

      const inputStyle = {
        width:"100%", padding:"10px 14px 10px 38px", borderRadius:"12px",
        border:`1.5px solid ${P.cream}20`, background:P.surfaceDark,
        fontSize:"14px", outline:"none", boxSizing:"border-box",
        fontFamily:"'Crimson Pro',Georgia,serif", color:P.cream,
      };

      return (
        <Modal onClose={onClose} title="Buch hinzufügen">
          <div style={{ display:"flex", gap:"3px", padding:"3px", background:P.surfaceDark, borderRadius:"14px", marginBottom:"24px" }}>
            {[{id:"search",label:"Suche",icon:"search"},{id:"camera",label:"Foto vom Buch",icon:"camera"}].map(t=>(
              <button key={t.id} type="button" onClick={()=>setTab(t.id)} style={{
                flex:1, padding:"9px", borderRadius:"11px", fontSize:"13px", fontWeight:600,
                background:tab===t.id?P.surface:"transparent",
                color:tab===t.id?P.cream:P.textMuted,
                border:tab===t.id?`1px solid ${P.cream}15`:"1px solid transparent",
                cursor:"pointer", transition:"all 0.2s",
                fontFamily:"'Crimson Pro',Georgia,serif",
                display:"flex", alignItems:"center", justifyContent:"center", gap:"6px",
              }}>
                <Icon name={t.icon} size={14} color={tab===t.id?P.cream:P.textMuted}/> {t.label}
              </button>
            ))}
          </div>

          {tab==="search" && (
            <>
              <div className="sm-addbook-search-row" style={{ display:"flex", gap:"8px", marginBottom:"8px", alignItems:"stretch" }}>
                <div style={{ flex:1, position:"relative", minWidth:0 }}>
                  <div style={{ position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)", zIndex:2, pointerEvents:"none" }}>
                    <Icon name="search" size={15} color={P.textDim}/>
                  </div>
                  <input
                    style={inputStyle}
                    placeholder="Titel oder Autor tippen – Vorschläge erscheinen automatisch"
                    value={query}
                    autoComplete="off"
                    onChange={e=>{ setQuery(e.target.value); setSuggestOpen(true); }}
                    onFocus={()=> setSuggestOpen(true)}
                    onBlur={()=>{
                      blurTimer.current = setTimeout(()=> setSuggestOpen(false), 200);
                    }}
                    onKeyDown={e=>{
                      if (e.key==="Enter" && !searching) {
                        e.preventDefault();
                        if (blurTimer.current) clearTimeout(blurTimer.current);
                        handleSearch();
                      }
                    }}
                  />
                  {suggestOpen && query.trim().length >= 2 && (suggestions.length > 0 || suggestLoading) && (
                    <div style={{
                      position:"absolute", left:0, right:0, top:"calc(100% + 6px)", zIndex:1200,
                      maxHeight:220, overflowY:"auto",
                      background:P.brickDark, borderRadius:14, border:`1px solid ${P.cream}18`,
                      boxShadow:"0 12px 40px rgba(0,0,0,0.35)",
                    }}>
                      {suggestLoading && suggestions.length===0 && (
                        <div style={{ padding:"12px 14px", fontSize:13, color:P.textMuted }}>Vorschläge werden geladen…</div>
                      )}
                      {suggestions.map((b, i)=>(
                        <button
                          key={`sug-${b.title}-${i}`}
                          type="button"
                          onPointerDown={(e)=>{
                            if (e.pointerType === "mouse" && e.button !== 0) return;
                            e.preventDefault();
                            if (blurTimer.current) clearTimeout(blurTimer.current);
                            pickSuggestion(b);
                          }}
                          style={{
                            display:"flex", alignItems:"center", gap:12, width:"100%", textAlign:"left",
                            padding:"10px 14px", border:"none", borderBottom:i<suggestions.length-1?`1px solid ${P.cream}08`:"none",
                            background:"transparent", cursor:"pointer", fontFamily:"inherit",
                            color:P.cream, fontSize:14,
                          }}
                        >
                          <CoverThumb url={b.cover_url}/>
                          <span style={{ flex:1, minWidth:0 }}>
                            <span style={{ fontWeight:700, display:"block" }}>{b.title}</span>
                            <span style={{ display:"block", fontSize:12, color:P.textMuted, marginTop:2 }}>{b.author}{b.year ? ` · ${b.year}` : ""}</span>
                          </span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <Btn accent={accent} disabled={searching} onClick={handleSearch}>{searching ? "Suche…" : "Suchen"}</Btn>
              </div>
              <p style={{ fontSize:"12px", color:P.textDim, marginBottom:12, lineHeight:1.45 }}>
                Beim Tippen: <strong style={{ color:P.textMuted }}>Live-Vorschläge</strong> von Open Library. Bei <strong style={{ color:P.textMuted }}>Suchen</strong> werden mehrere Varianten kombiniert (Tippfehler, erste Wörter, Umlaute).
              </p>
              {searchErr && <p style={{ fontSize:13, color:"#e8a598", marginBottom:12 }}>{searchErr}</p>}
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {results.map((b,i)=>(
                  <div key={`${b.title}-${i}`} className="sm-search-hit" style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between", gap:12,
                    padding:"12px 14px", borderRadius:"14px", background:P.surfaceDark,
                    border:`1px solid ${P.cream}10`,
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0, flex:1 }}>
                      <CoverThumb url={b.cover_url} w={48} h={68}/>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:"14px", fontWeight:700, color:P.cream }}>{b.title}</div>
                        <div style={{ fontSize:"12px", color:P.textMuted }}>{b.author}{b.year ? ` · ${b.year}` : ""}</div>
                      </div>
                    </div>
                    <Btn accent={accent} small className="sm-hit-add-btn" onClick={()=>{ onAddBook(b); onClose(); }}>
                      <Icon name="plus" size={13} color={P.brickDark}/> Hinzufügen
                    </Btn>
                  </div>
                ))}
              </div>
            </>
          )}

          {tab==="camera" && (
            <div>
              <p style={{ fontSize:13, color:P.textMuted, lineHeight:1.55, marginBottom:14 }}>
                Mach ein Foto von <strong style={{color:P.cream}}>Titelseite</strong>, <strong style={{color:P.cream}}>Rücken</strong>
                {" "}oder dem <strong style={{color:P.cream}}>ISBN-Barcode</strong>. Strichcodes werden zuerst ausgewertet, sonst
                {" "}<strong style={{color:P.cream}}>Texterkennung</strong> direkt im Browser (Tesseract) — beim ersten Mal kann das
                länger dauern und Daten werden nachgeladen (WLAN empfohlen).
              </p>
              <input
                ref={camInputCameraRef}
                type="file"
                accept="image/*"
                capture="environment"
                style={{ display:"none" }}
                onChange={onCameraInputChange}
              />
              <input
                ref={camInputGalleryRef}
                type="file"
                accept="image/*"
                style={{ display:"none" }}
                onChange={onCameraInputChange}
              />
              <div style={{ display:"flex", flexWrap:"wrap", gap:10, justifyContent:"center", marginBottom:16 }}>
                <Btn type="button" accent={accent} onClick={() => camInputCameraRef.current?.click()}>
                  <Icon name="camera" size={14} color={P.brickDark}/> Kamera / Foto
                </Btn>
                <Btn type="button" variant="secondary" onClick={() => camInputGalleryRef.current?.click()}>Aus Galerie</Btn>
              </div>

              {cameraPreviewUrl ? (
                <div style={{
                  marginBottom:14, borderRadius:14, overflow:"hidden", border:`1px solid ${P.cream}15`,
                  maxHeight:220, background:P.brickDark, display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <img src={cameraPreviewUrl} alt="" style={{ maxWidth:"100%", maxHeight:220, objectFit:"contain", display:"block" }} />
                </div>
              ) : null}

              {scanning ? (
                <div style={{ textAlign:"center", padding:"18px 8px", borderRadius:14, background:P.surfaceDark, border:`1px solid ${P.cream}10` }}>
                  <Ghost size={40} style={{ margin:"0 auto 12px", animation:"ghostFloat 1.8s ease-in-out infinite", display:"block" }}/>
                  <div style={{ fontSize:13, color:P.textMuted }}>{cameraStatus || "Bild wird verarbeitet…"}</div>
                  <div style={{ width:"120px", height:"3px", background:P.brick, borderRadius:"2px", margin:"14px auto 0", overflow:"hidden" }}>
                    <div style={{ width:"45%", height:"100%", background:P.goldLight, borderRadius:"2px", animation:"scanMove 1.8s ease-in-out infinite" }}/>
                  </div>
                </div>
              ) : cameraStatus ? (
                <p style={{ fontSize:12, color:P.textMuted, marginBottom:10 }}>{cameraStatus}</p>
              ) : null}

              {cameraErr ? <p style={{ fontSize:13, color:"#e8a598", marginBottom:12 }}>{cameraErr}</p> : null}

              {cameraSnippet && !scanning ? (
                <details style={{ fontSize:12, color:P.textDim, marginBottom:12 }}>
                  <summary style={{ cursor:"pointer", marginBottom:6 }}>Erkannter Text (Auszug)</summary>
                  <pre style={{
                    whiteSpace:"pre-wrap", wordBreak:"break-word", padding:12, borderRadius:12,
                    background:P.surfaceDark, border:`1px solid ${P.cream}08`, maxHeight:120, overflow:"auto",
                    fontFamily:"'Crimson Pro',Georgia,serif",
                  }}>{cameraSnippet}</pre>
                </details>
              ) : null}

              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {(cameraHits || []).map((b, i)=>(
                  <div key={`cam-${String(b.title)}-${i}`} className="sm-search-hit" style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between", gap:12,
                    padding:"12px 14px", borderRadius:"14px", background:P.surfaceDark,
                    border:`1px solid ${P.cream}10`,
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0, flex:1 }}>
                      <CoverThumb url={b.cover_url} w={48} h={68}/>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:"14px", fontWeight:700, color:P.cream }}>{b.title}</div>
                        <div style={{ fontSize:"12px", color:P.textMuted }}>{b.author}{b.year ? ` · ${b.year}` : ""}</div>
                      </div>
                    </div>
                    <Btn type="button" accent={accent} small className="sm-hit-add-btn" onClick={()=>{ onAddBook(b); onClose(); }}>
                      <Icon name="plus" size={13} color={P.brickDark}/> Hinzufügen
                    </Btn>
                  </div>
                ))}
              </div>
              {!scanning && scanMiss && !cameraHits.length ? (
                <p style={{ color:P.textDim, fontSize:13, marginTop:14 }}>
                  Kein Treffer — Titel scharf und gut beleuchtet, oder im Tab „Suche“ eingeben.
                </p>
              ) : null}
            </div>
          )}
        </Modal>
      );
    }

    function ProfilePage({ user, books, borrowedItems, accent, cardBg, onRemoveBook, onRateBook, onOpenAdd, themeKey, onSetTheme, friendCount, onReturnLoan, onLendBook, onAddSuggestedBook, toast, sb, onReloadShelf }) {
      const shelfUserId = user && user.id;
      const [recoBooks, setRecoBooks] = useState([]);
      const [recoLoading, setRecoLoading] = useState(false);
      const [recoErr, setRecoErr] = useState("");
      const [recoAddingKey, setRecoAddingKey] = useState("");
      const [merkliste, setMerkliste] = useState([]);
      const [recoRule, setRecoRule] = useState("author_keyword");
      const [recoGenreSubject, setRecoGenreSubject] = useState("");
      const [inferredShelfGenres, setInferredShelfGenres] = useState([]);
      const [inferGenreBusy, setInferGenreBusy] = useState(false);
      const [recoMinYearStr, setRecoMinYearStr] = useState("");
      const [recoGenrePanelOpen, setRecoGenrePanelOpen] = useState(false);
      const [recoRefreshNonce, setRecoRefreshNonce] = useState(0);
      const [backfillOlBusy, setBackfillOlBusy] = useState(false);

      const bookIdsSig = useMemo(() => [...books.map((b) => b.id)].sort((a, b) => String(a).localeCompare(String(b))).join(","), [books]);
      const booksMissingOlWorkKey = useMemo(
        () => books.filter((b) => !normalizeOpenLibraryWorkKey(b.open_library_work_key)),
        [books]
      );
      const merkKeySet = useMemo(() => new Set(merkliste.map(bookDiscoveryKey)), [merkliste]);
      const ruleHintLine = useMemo(() => SHELF_RECO_RULES.find((r) => r.id === recoRule)?.hint || "", [recoRule]);
      const recoGenreSummaryLabel = useMemo(() => {
        if (!recoGenreSubject.trim()) return "";
        const g = recoGenreSubject.trim();
        const preset = RECO_MAJOR_GENRES.find(
          (gi) => gi.subject && gi.subject.toLowerCase() === g.toLowerCase()
        );
        return preset ? preset.labelDe : g;
      }, [recoGenreSubject]);

      useEffect(() => {
        if (!shelfUserId) return;
        setRecoRule(readShelfRecoRule(shelfUserId));
        let gsub = readShelfRecoGenreSubject(shelfUserId);
        try {
          if (!gsub) {
            const old = localStorage.getItem(shelfRecoPrefsKey(shelfUserId, "subject"));
            if (old && String(old).trim()) {
              gsub = String(old).trim();
              writeShelfRecoGenreSubject(shelfUserId, gsub);
              localStorage.removeItem(shelfRecoPrefsKey(shelfUserId, "subject"));
            }
          }
        } catch (_) { /* */ }
        setRecoGenreSubject(gsub ? String(gsub).trim() : "");
        setRecoMinYearStr(readShelfRecoMinYear(shelfUserId));
      }, [shelfUserId]);

      useEffect(() => {
        if (!shelfUserId) {
          setMerkliste([]);
          return;
        }
        setMerkliste(loadMerkliste(shelfUserId));
      }, [shelfUserId]);

      useEffect(() => {
        const ac = new AbortController();
        if (!books || books.length === 0) {
          setInferredShelfGenres([]);
          setInferGenreBusy(false);
          return () => ac.abort();
        }
        let alive = true;
        setInferGenreBusy(true);
        inferShelfSubjectsFromOpenLibrary(books, { maxLookups: 12, signal: ac.signal })
          .then((subjs) => {
            if (alive) setInferredShelfGenres(subjs || []);
          })
          .catch(() => {
            if (alive) setInferredShelfGenres([]);
          })
          .finally(() => {
            if (alive) setInferGenreBusy(false);
          });
        return () => {
          alive = false;
          ac.abort();
        };
      }, [bookIdsSig, books.length]);

      useEffect(() => {
        let cancelled = false;
        const run = async () => {
          if (!books || books.length === 0) {
            setRecoBooks([]);
            setRecoErr("");
            setRecoLoading(false);
            return;
          }
          setRecoLoading(true);
          setRecoErr("");
          try {
            const list = await fetchShelfRecommendations(books, {
              rule: recoRule,
              subjectExtra: recoGenreSubject,
              minYear: recoMinYearStr.replace(/\D/g, "").slice(0, 4),
              refreshVariant: recoRefreshNonce,
            });
            if (!cancelled) setRecoBooks(list);
          } catch (e) {
            const msg = (e && e.message) ? e.message : String(e);
            if (!cancelled) {
              setRecoErr(msg);
              setRecoBooks([]);
            }
          } finally {
            if (!cancelled) setRecoLoading(false);
          }
        };
        run();
        return () => { cancelled = true; };
      }, [bookIdsSig, books.length, recoRule, recoGenreSubject, recoMinYearStr, recoRefreshNonce]);

      const runBackfillOpenLibraryWorkKeys = async () => {
        if (!sb || !shelfUserId || backfillOlBusy || !books.length) return;
        setBackfillOlBusy(true);
        try {
          await backfillMissingOpenLibraryWorkKeysForShelf(books, sb, shelfUserId, {
            maxBooks: 45,
            toast,
            onReloadShelf: typeof onReloadShelf === "function" ? onReloadShelf : undefined,
          });
        } finally {
          setBackfillOlBusy(false);
        }
      };

      const setRecoRulePersist = (nextRule) => {
        setRecoRule(nextRule);
        if (shelfUserId) writeShelfRecoRule(shelfUserId, nextRule);
      };

      const setRecoGenrePersist = (subjectStr) => {
        const next = String(subjectStr || "").trim();
        setRecoGenreSubject(next);
        if (shelfUserId) writeShelfRecoGenreSubject(shelfUserId, next);
      };

      const recoGenreChipStyle = (active) => ({
        display:"inline-flex",
        alignItems:"center",
        justifyContent:"center",
        padding:"10px 16px",
        borderRadius:999,
        fontSize:13,
        fontWeight:600,
        fontFamily:"inherit",
        cursor:"pointer",
        border:active ? `2px solid ${accent}` : `1px solid ${P.cream}28`,
        background:active ? `${accent}2a` : P.brickDark,
        color:active ? P.cream : P.textMuted,
        transition:"border 0.15s, background 0.15s",
        flexShrink:0,
        WebkitTapHighlightColor:"rgba(242,230,217,0.1)",
      });

      const toggleMerk = (bk) => {
        if (!shelfUserId) return;
        const k = bookDiscoveryKey(bk);
        const had = merkKeySet.has(k);
        setMerkliste((prev) => {
          let next;
          if (had) next = prev.filter((x) => bookDiscoveryKey(x) !== k);
          else next = [...prev, {
            title: bk.title,
            author: bk.author,
            year: typeof bk.year === "number" ? bk.year : 0,
            link: bk.link || null,
            cover_url: bk.cover_url || null,
            work_key: normalizeOpenLibraryWorkKey(bk.work_key || bk.open_library_work_key || null),
            merkedAt: new Date().toISOString(),
          }];
          saveMerkliste(shelfUserId, next);
          return next;
        });
        if (toast) toast(had ? "Vom Merkzettel entfernt." : "Auf den Merkzettel gelegt.");
      };

      const removeMerkItem = (bk) => {
        if (!shelfUserId) return;
        const k = bookDiscoveryKey(bk);
        setMerkliste((prev) => {
          const next = prev.filter((x) => bookDiscoveryKey(x) !== k);
          saveMerkliste(shelfUserId, next);
          return next;
        });
      };

      const addRecoBook = async (bk) => {
        if (!onAddSuggestedBook) return;
        const k = bookDiscoveryKey(bk);
        setRecoAddingKey(k);
        try {
          const ok = await onAddSuggestedBook(bk);
          if (ok !== false) {
            setRecoBooks((prev) => prev.filter((r) => bookDiscoveryKey(r) !== k));
            if (shelfUserId) {
              setMerkliste((prev) => {
                const next = prev.filter((x) => bookDiscoveryKey(x) !== k);
                saveMerkliste(shelfUserId, next);
                return next;
              });
            }
          }
        } finally {
          setRecoAddingKey("");
        }
      };

      const openRecoLink = (url) => {
        if (!url) return;
        try { window.open(url, "_blank", "noopener,noreferrer"); }
        catch (e) {
          if (toast) toast("Link konnte nicht geöffnet werden.");
        }
      };

      const ownCount = books.filter((b)=>!b.loanOut).length;
      const lentCount = books.filter((b)=>b.loanOut).length;
      return (
        <div className="sm-page">
          <div className="sm-profile-head">
            <div style={{ position:"relative" }}>
              <Avatar initials={user.initials} size={64} accent={accent}/>
              <Ghost size={24} style={{ position:"absolute", top:-8, right:-10 }}/>
            </div>
            <div>
              <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, letterSpacing:"-0.3px" }}>{user.name}</h1>
              <p style={{ fontSize:"14px", color:P.textMuted, lineHeight:1.5 }}>
                {user.username} · {ownCount} im Regal · {lentCount} verliehen · {borrowedItems.length} geliehen · {friendCount} Freund·innen
              </p>
            </div>
          </div>

          {borrowedItems.length > 0 && (
            <>
              <div style={{ marginBottom:12 }}>
                <h2 style={{ fontSize:"20px", fontWeight:700, color:P.foliageLight }}>Gerade geliehen</h2>
                <p style={{ fontSize:12, color:P.textMuted, marginTop:4 }}>Diese Exemplare liegen bei dir · markiert für dich und für Freund·innen an deinem Regal.</p>
              </div>
              <div className="sm-grid sm-grid-3cols" style={{ marginBottom:36 }}>
                {borrowedItems.map((row) => (
                  <BookCard
                    key={`br-${row.loanId}`}
                    book={row.book}
                    accent={accent}
                    cardBg={cardBg}
                    borrowedFrom={{ loanId: row.loanId, lender: row.lender }}
                    onReturnLoan={onReturnLoan}
                  />
                ))}
              </div>
            </>
          )}

          <div className="sm-stack-title">
            <h2 style={{ fontSize:"20px", fontWeight:700, color:P.cream }}>Meine Bücher</h2>
            <Btn accent={accent} onClick={onOpenAdd}><Icon name="plus" size={14} color={P.brickDark}/> Hinzufügen</Btn>
          </div>

          {books.length===0 ? (
            <div style={{ textAlign:"center", padding:"50px 20px" }}>
              <Ghost size={56} style={{ margin:"0 auto 12px" }}/>
              <p style={{ color:P.textDim }}>Dein Regal ist leer – füge dein erstes Buch hinzu.</p>
            </div>
          ) : (
            <div className="sm-grid sm-grid-3cols" style={{ marginBottom:"40px" }}>
              {books.map((b)=>(
                <BookCard
                  key={b.id}
                  book={b}
                  accent={accent}
                  cardBg={cardBg}
                  showRemove
                  onRemove={onRemoveBook}
                  onRateBook={onRateBook}
                  loanOut={b.loanOut}
                  onReturnLoan={onReturnLoan}
                  onLend={onLendBook}
                />
              ))}
            </div>
          )}

          {books.length > 0 && (
            <div style={{ marginBottom:"28px" }}>
              <div style={{ marginBottom:"10px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px", minHeight:44 }}>
                  <Icon name="search" size={17} color={P.goldLight}/>
                  <span style={{ fontSize:"20px", fontWeight:700, color:P.foliageLight }}>Zum Stöbern</span>
                </div>
                <p style={{ fontSize:12, color:P.textMuted, marginTop:"6px", lineHeight:1.5 }}>
                  Vorschläge nutzen Open Library · sehr wahrscheinlich gleiche Bücher wie im eigenen Regal werden ausgeschlossen (auch bei anderem Titelwortlaut oder Sprache). Rechts neben der Buchleiste: <strong style={{ color:P.cream }}>Neue Tipps</strong> lädt eine <strong style={{ color:P.cream }}>andere Rotation</strong> aus deinen Autor·innen und Stichwörtern (ohne hochscrollen). Genre-Chips: „Genre & Themen wählen“.
                </p>
                {sb && booksMissingOlWorkKey.length > 0 ? (
                  <div style={{ marginTop:12, padding:"12px 14px", borderRadius:14, background:`${P.cream}08`, border:`1px solid ${P.cream}12` }}>
                    <p style={{ fontSize:12, color:P.textMuted, lineHeight:1.5, marginBottom:10 }}>
                      <strong style={{ color:P.cream }}>{booksMissingOlWorkKey.length}</strong>{" "}
                      {booksMissingOlWorkKey.length === 1 ? "Buch hat" : "Bücher haben"} noch keine Open-Library-Werk-ID — Vorschläge erkennen Übersetzungen dann nur unscharf. Einmalig bei Open Library nachziehen (dauert etwas, WLAN ist angenehmer):
                    </p>
                    <Btn
                      variant="secondary"
                      small
                      disabled={backfillOlBusy}
                      onClick={runBackfillOpenLibraryWorkKeys}

                  {inferGenreBusy ? (

                  {!inferGenreBusy && inferredShelfGenres.length > 0 ? (

                <label style={{ display:"flex", flexDirection:"column", gap:6, fontSize:12, color:P.textMuted }}>

              <div

                <div style={{ flex:1, minWidth:0 }}>
              {recoLoading ? (

                      background:P.surfaceDark, border:`1px solid ${P.cream}08` }}>

                      <div style={{ height:10, borderRadius:4, background:`${P.cream}0c`, marginBottom:6 }}/>
                      <div style={{ height:8, width:"70%", borderRadius:4, background:`${P.cream}08` }}/>
                    </div>
                  ))}
                </div>
              ) : recoBooks.length === 0 ? (
                <p style={{ fontSize:13, color:P.textDim, padding:"8px 0" }}>Keine zusätzlichen Treffer gefunden — mit mehr Büchern kommen oft neue Ideen.</p>
              ) : (
                <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:6 }}>
                  <div style={{ display:"flex", gap:14, padding:"4px 2px", minWidth:"min-content" }}>
                    {recoBooks.map((rb) => {
                      const dk = bookDiscoveryKey(rb);
                      const adding = recoAddingKey === dk;
                      return (
                        <div key={dk} style={{
                          flex:"0 0 auto", width:128,
                          padding:"10px 10px 12px",
                          borderRadius:"16px",
                          background:P.surfaceDark,
                          border:`1px solid ${P.cream}10`,
                          display:"flex",
                          flexDirection:"column",
                          gap:8,
                          boxSizing:"border-box",
                        }}>
                          <div style={{
                            width:"100%",
                            aspectRatio:"2/3",
                            borderRadius:"10px",
                            overflow:"hidden",
                            background:`${P.cream}08`,
                            display:"flex",
                            alignItems:"center",
                            justifyContent:"center",
                          }}>
                            {rb.cover_url ? (
                              <img src={rb.cover_url} alt="" draggable={false} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                            ) : (
                              <Icon name="book" size={36} color={P.textMuted}/>
                            )}
                          </div>
                          <div style={{ minHeight:"2.8em", fontSize:"13px", fontWeight:700, color:P.cream,
                            display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden", lineHeight:1.35 }}>
                            {rb.title}
                          </div>
                          <div style={{ fontSize:"11px", color:P.textMuted,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{rb.author}</div>
                          {typeof rb.year === "number" && rb.year > 0 ? (
                            <div style={{ fontSize:"10px", color:P.textDim }}>{rb.year}</div>
                          ) : null}
                          <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:"auto", paddingTop:2 }}>
                            <Btn
                              variant="secondary"
                              small
                              disabled={!shelfUserId}
                              onClick={() => toggleMerk(rb)}
                              style={{ justifyContent:"center" }}
                            >
                              <Icon name="star" size={14} color={merkKeySet.has(dk) ? accent : P.cream}/>
                              <span style={{ marginLeft:4 }}>{merkKeySet.has(dk) ? "Gemerkt" : "Merken"}</span>
                            </Btn>
                            <Btn accent={accent} small disabled={adding} onClick={() => addRecoBook(rb)}>
                              {adding ? "…" : <>Ins Regal</>}
                            </Btn>
                            {rb.link ? (
                              <button type="button" onClick={() => openRecoLink(rb.link)}
                                style={{
                                  fontSize:"11px", border:"none", background:"none",
                                  color:P.textMuted, cursor:"pointer", textDecoration:"underline", padding:0, textAlign:"left",
                                  fontFamily:"inherit",
                                }}>
                                Bei Open Library
                              </button>
                            ) : null}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
                </div>
                <div style={{ flexShrink:0, alignSelf:"stretch", display:"flex", alignItems:"center", justifyContent:"center", paddingBottom:6 }}>
                  <Btn
                    variant="secondary"
                    small
                    className="sm-reco-refresh-btn"
                    disabled={recoLoading}
                    title="Andere Autor·innen-Stichwörter und Reihenfolge — neue Vorschläge"
                    onClick={() => setRecoRefreshNonce((n) => n + 1)}
                    style={{
                      minHeight:48,
                      minWidth:104,
                      maxWidth:120,
                      flexDirection:"column",
                      alignItems:"center",
                      justifyContent:"center",
                      gap:6,
                      padding:"10px 10px",
                      whiteSpace:"normal",
                      lineHeight:1.2,
                      textAlign:"center",
                    }}
                  >
                    <Icon name="refresh" size={16} color={P.cream}/>
                    <span style={{ fontSize:12, fontWeight:700 }}>Neue<br/>Tipps</span>
                  </Btn>
                </div>
              </div>

              {shelfUserId && merkliste.length > 0 && (
                <div style={{
                  marginTop:18,
                  padding:"16px 18px",
                  borderRadius:"16px",
                  background:`${P.cream}05`,
                  border:`1px solid ${P.cream}12`,
                }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <Icon name="star" size={16} color={P.goldLight}/>
                    <span style={{ fontSize:"16px", fontWeight:700, color:P.cream }}>Merkezettel</span>
                    <span style={{ fontSize:12, color:P.textMuted }}>({merkliste.length})</span>
                  </div>
                  <p style={{ fontSize:11, color:P.textDim, marginBottom:12, lineHeight:1.5 }}>
                    Nur auf diesem Gerät gespeichert — zum Einkaufen oder später ins Regal ziehen.
                  </p>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {merkliste.map((mb) => {
                      const mk = bookDiscoveryKey(mb);
                      const busyMerk = recoAddingKey === mk;
                      return (
                        <div key={mk} style={{
                          display:"flex", alignItems:"center", gap:12,
                          padding:"10px 12px", borderRadius:14,
                          background:P.surfaceDark, border:`1px solid ${P.cream}10`,
                        }}>
                          <div style={{
                            width:44, height:64, flexShrink:0, borderRadius:8, overflow:"hidden",
                            background:`${P.cream}08`, display:"flex", alignItems:"center", justifyContent:"center",
                          }}>
                            {mb.cover_url ? (
                              <img src={mb.cover_url} alt="" draggable={false} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                            ) : (
                              <Icon name="book" size={22} color={P.textMuted}/>
                            )}
                          </div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:14, fontWeight:700, color:P.cream, lineHeight:1.3,
                              display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>
                              {mb.title}
                            </div>
                            <div style={{ fontSize:12, color:P.textMuted, marginTop:4, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                              {mb.author}{typeof mb.year === "number" && mb.year > 0 ? ` · ${mb.year}` : ""}
                            </div>
                          </div>
                          <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
                            <Btn accent={accent} small disabled={busyMerk} onClick={() => addRecoBook(mb)}>
                              {busyMerk ? "…" : "Ins Regal"}
                            </Btn>
                            <Btn variant="secondary" small onClick={() => removeMerkItem(mb)}>Entfernen</Btn>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

          <div style={{ padding:"22px 24px", borderRadius:"18px", background:P.surfaceDark, border:`1px solid ${P.cream}10`, marginBottom:"20px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"14px" }}>
              <Icon name="palette" size={17} color={P.textMuted}/>
              <span style={{ fontSize:"15px", fontWeight:700, color:P.cream }}>Akzentfarbe</span>
            </div>
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap" }}>
              {Object.entries(THEMES).map(([key,t])=>(
                <button key={key} type="button" onClick={()=>onSetTheme(key)} title={t.name} style={{
                  width:"38px", height:"38px", borderRadius:"50%",
                  background:t.accent, cursor:"pointer",
                  border:themeKey===key?`3px solid ${P.cream}`:"3px solid transparent",
                  outline:themeKey===key?`2px solid ${t.accent}60`:"none",
                  outlineOffset:"2px", transition:"all 0.2s",
                  boxShadow:"0 2px 8px rgba(0,0,0,0.2)",
                }}/>
              ))}
            </div>
          </div>

          <div style={{ padding:"16px 20px", borderRadius:"14px", background:P.surfaceDark, border:`1px solid ${P.cream}08`, fontSize:"12px", color:P.textDim, lineHeight:1.8 }}>
            <span style={{ fontWeight:700, textTransform:"uppercase", letterSpacing:"0.8px", fontSize:"10px" }}>Backend</span><br/>
            <span style={{ color:P.textMuted }}>Supabase · Postgres · Auth · Row Level Security</span>
          </div>
        </div>
      );
    }

    function FriendsPage({ accent, cardBg, currentProfile, friends, discover, friendships, incoming, outgoing,
      onRefresh, sb, toast }) {
      const [viewFriend, setViewFriend] = useState(null);
      const [theirBooks, setTheirBooks] = useState([]);
      const [theirLoanMap, setTheirLoanMap] = useState({});
      const [loadingBooks, setLoadingBooks] = useState(false);
      const [showAdd, setShowAdd] = useState(false);
      const [inviteUser, setInviteUser] = useState("");

      const openFriend = async (fid) => {
        const fp = friends.find(f=>f.id===fid);
        setViewFriend(fp||null);
        setTheirBooks([]);
        setTheirLoanMap({});
        if (!fid) return;
        setLoadingBooks(true);
        const { data, error } = await sb.from("books").select("*").eq("user_id", fid).order("created_at", { ascending: false });
        if (error) {
          toast(error.message);
          setLoadingBooks(false);
          return;
        }
        setTheirBooks(data||[]);
        const { data: lns } = await sb.from("book_loans").select("*").eq("lender_id", fid).eq("status", "active");
        const brw = [...new Set((lns||[]).map((l)=>l.borrower_id))];
        const { data: bprofs } = brw.length ? await sb.from("profiles").select("*").in("id", brw) : { data: [] };
        const bm = Object.fromEntries((bprofs||[]).map((p)=>[p.id, p]));
        const mmap = {};
        (lns||[]).forEach((l) => { mmap[l.book_id] = { loanId: l.id, borrower: bm[l.borrower_id] }; });
        setTheirLoanMap(mmap);
        setLoadingBooks(false);
      };

      const sendRequest = async (toId) => {
        const { error } = await sb.from("friendships").insert({ requester_id: currentProfile.id, addressee_id: toId, status: "pending" });
        if (error) toast(error.message); else toast("Anfrage gesendet");
        onRefresh();
        setShowAdd(false);
      };

      const acceptIncoming = async (row) => {
        const { error } = await sb.from("friendships").update({ status: "accepted" }).eq("id", row.id);
        if (error) toast(error.message); else toast("Freundschaft akzeptiert");
        onRefresh();
      };

      const rejectIncoming = async (rowId) => {
        const { error } = await sb.from("friendships").delete().eq("id", rowId);
        if (error) toast(error.message); else onRefresh();
      };

      const friendIdSet = new Set(friends.map(f=>f.id));
      const discoverRows = discover.filter(u => {
        if (friendIdSet.has(u.id)) return false;
        const rel = friendships.find(f =>
          (f.requester_id === currentProfile.id && f.addressee_id === u.id) ||
          (f.addressee_id === currentProfile.id && f.requester_id === u.id));
        return !rel;
      });

      return (
        <div className="sm-page">
          <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, marginBottom:"4px" }}>Freunde</h1>
          <p style={{ fontSize:"14px", color:P.textMuted, marginBottom:"24px" }}>{friends.length} Freunde</p>

          {incoming.length > 0 && (
            <div style={{ marginBottom:24 }}>
              <h2 style={{ fontSize:"16px", color:P.goldLight, marginBottom:10 }}>Eingegangene Anfragen</h2>
              {incoming.map(row=>{
                const p = row.requester;
                const uObj = profileToUser(p);
                if (!uObj) return null;
                return (
                  <div key={row.id} className="sm-request-row" style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", borderRadius:"14px",
                    background:P.surfaceDark, border:`1px solid ${P.cream}12`, marginBottom:8 }}>
                    <Avatar initials={uObj.initials} size={40} accent={accent}/>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700 }}>{uObj.name}</div>
                      <div style={{ fontSize:12, color:P.textMuted }}>{uObj.username}</div>
                    </div>
                    <Btn accent={accent} small onClick={()=>acceptIncoming(row)}>Annehmen</Btn>
                    <Btn variant="secondary" small onClick={()=>rejectIncoming(row.id)}>Ablehnen</Btn>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"24px" }}>
            {friends.map(f=>{
              const uObj = profileToUser(f);
              return (
              <button key={f.id} type="button" onClick={()=>openFriend(f.id)} style={{
                display:"flex", alignItems:"center", gap:"14px",
                padding:"14px 18px", borderRadius:"16px",
                background:P.surfaceDark, border:`1px solid ${P.cream}10`,
                cursor:"pointer", transition:"all 0.2s", textAlign:"left",
                fontFamily:"inherit", color:"inherit",
              }}>
                <Avatar initials={uObj.initials} size={42} accent={accent}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"15px", fontWeight:700, color:P.cream }}>{uObj.name}</div>
                  <div style={{ fontSize:"12px", color:P.textMuted }}>{uObj.username}</div>
                </div>
                <Icon name="chevron" size={16} color={P.textDim}/>
              </button>
            );})}
          </div>

          {outgoing.length > 0 && (
            <p style={{ fontSize:13, color:P.textDim, marginBottom:16 }}>
              Ausstehende Anfragen: {outgoing.length}
            </p>
          )}

          <Btn variant="secondary" onClick={()=>setShowAdd(true)}>
            <Icon name="plus" size={14}/> Freunde finden
          </Btn>

          {showAdd && (
            <Modal onClose={()=>setShowAdd(false)} title="Freunde finden">
              <p style={{ fontSize:13, color:P.textMuted, marginBottom:12 }}>Nutzername (exakt, z. B. <code style={{color:P.goldLight}}>reader_a1b2c3d4</code>)</p>
              <div className="sm-invite-controls" style={{ display:"flex", gap:8, marginBottom:16 }}>
                <input value={inviteUser} onChange={e=>setInviteUser(e.target.value)}
                  placeholder="username"
                  style={{ flex:1, padding:"10px 12px", borderRadius:12, border:`1px solid ${P.cream}20`, background:P.surfaceDark, color:P.cream, fontFamily:"inherit", minWidth:0 }}/>
                <Btn accent={accent} onClick={()=>{
                  const q = inviteUser.trim().toLowerCase();
                  const u = discoverRows.find(x => (x.username||"").toLowerCase() === q);
                  if (u) sendRequest(u.id); else toast("Nutzer nicht gefunden oder schon verbunden");
                }}>Suchen &amp; anfragen</Btn>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {discoverRows.length===0 ? (
                  <p style={{ textAlign:"center", color:P.textDim, padding:"20px" }}>Keine weiteren Profile — oder alle schon verbunden.</p>
                ) : discoverRows.map(p=>{
                  const uObj = profileToUser(p);
                  return (
                    <div key={p.id} style={{
                      display:"flex", alignItems:"center", gap:"14px",
                      padding:"12px 14px", borderRadius:"14px", background:P.surfaceDark,
                    }}>
                      <Avatar initials={uObj.initials} size={38} accent={accent}/>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:"14px", fontWeight:700, color:P.cream }}>{uObj.name}</div>
                        <div style={{ fontSize:"12px", color:P.textMuted }}>{uObj.username}</div>
                      </div>
                      <Btn accent={accent} small onClick={()=>sendRequest(p.id)}>Anfragen</Btn>
                    </div>
                  );
                })}
              </div>
            </Modal>
          )}

          {viewFriend && (
            <Modal onClose={()=>{ setViewFriend(null); setTheirBooks([]); setTheirLoanMap({}); }} title={profileToUser(viewFriend).name}>
              <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"24px" }}>
                <Avatar initials={profileToUser(viewFriend).initials} size={48} accent={accent}/>
                <div>
                  <div style={{ fontWeight:700, color:P.cream }}>{profileToUser(viewFriend).name}</div>
                  <div style={{ fontSize:"13px", color:P.textMuted }}>{profileToUser(viewFriend).username}</div>
                </div>
              </div>
              {loadingBooks ? <p style={{ color:P.textMuted }}>Lade Bücher…</p> : (
              <div className="sm-grid sm-grid-2cols">
                {theirBooks.map((b)=> (
                  <BookCard
                    key={b.id}
                    book={b}
                    accent={accent}
                    cardBg={cardBg}
                    loanOut={theirLoanMap[b.id]}
                    readOnlyLoan
                  />
                ))}

              </div>)}

    function mergeGroupBooksByTitleAuthor(books, getProfile) {
      const keyOf = (b) => `${String(b.title).trim().toLowerCase()}|${String(b.author).trim().toLowerCase()}`;
      const map = new Map();
      for (const b of books) {
        const owner = getProfile(b.user_id);
        if (!owner) continue;
        const k = keyOf(b);
        if (!map.has(k)) {
          map.set(k, {
            title: b.title,
            author: b.author,
            year: b.year,
            link: b.link,
            cover_url: b.cover_url || null,
            owners: [owner],
          });
        } else {
          const e = map.get(k);
          if (!e.owners.find((o) => o.id === owner.id)) e.owners.push(owner);
          if (!e.cover_url && b.cover_url) e.cover_url = b.cover_url;
        }
      }
      return [...map.values()];
    }

    function MainApp({ sb }) {
      const isMobile = useMobileLayout();
      const [page, setPage] = useState("profile");
      const [themeKey, setThemeKey] = useState(() => localStorage.getItem("sm_theme") || "terracotta");
      useEffect(() => { localStorage.setItem("sm_theme", themeKey); }, [themeKey]);
      const theme = THEMES[themeKey];
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [books, setBooks] = useState([]);
      const [borrowedItems, setBorrowedItems] = useState([]);
      const [lendTargetBook, setLendTargetBook] = useState(null);
      const [friends, setFriends] = useState([]);
      const [discover, setDiscover] = useState([]);
      const [friendships, setFriendships] = useState([]);
      const [incoming, setIncoming] = useState([]);
      const [outgoing, setOutgoing] = useState([]);
      const [loadingApp, setLoadingApp] = useState(true);
      const [showAddBook, setShowAddBook] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [passwordRecovery, setPasswordRecovery] = useState(false);
      const [authInitError, setAuthInitError] = useState(null);
      const [dataGateBlocked, setDataGateBlocked] = useState(null);
      const [authSessionHydrated, setAuthSessionHydrated] = useState(false);

      const toast = useCallback((msg) => {
        setToastMsg(msg); setTimeout(()=>setToastMsg(null), 3200);
      }, []);

      const loadAll = useCallback(async (sid) => {
        if (!sid) return;
        setDataGateBlocked(null);
        try {
          const { data: prof, error: pe } = await sb.from("profiles").select("*").eq("id", sid).maybeSingle();
          if (pe) {
            toast(pe.message);
            setProfile(null);
            setBooks([]); setBorrowedItems([]);
            setDataGateBlocked({ kind:"profile_query", hint:"Profil konnte nicht geladen werden (Supabase-/RLS-Fehler).", tech: pe.message });
            return;
          }
          if (!prof) {
            toast("Kein Profil gefunden. Supabase-SQL (Trigger/„profiles“-Zeile) prüfen und neu registrieren.");
            setProfile(null);
            setBooks([]);
            setBorrowedItems([]);
            setFriends([]); setDiscover([]); setFriendships([]); setIncoming([]); setOutgoing([]);
            setDataGateBlocked({
              kind:"missing_profile",
              hint:"Zu deinem angemeldeten Konto gibt es keine Zeile in der Tabelle profiles. Neue Accounts brauchen den Trigger aus supabase/schema.sql; bestehende ggf. dort einmal Nachziehen.",
              tech:null,
            });
            return;
          }
          setProfile(prof);

          const { data: myBooks, error: be } = await sb.from("books").select("*").eq("user_id", sid).order("created_at", { ascending: false });
          if (be) {
            toast(be.message);
          } else {
            const { data: asLender } = await sb.from("book_loans").select("*").eq("lender_id", sid).eq("status", "active");
            const borrowerIds = [...new Set((asLender||[]).map((x)=>x.borrower_id))];
            const { data: bprofsL } = borrowerIds.length ? await sb.from("profiles").select("*").in("id", borrowerIds) : { data: [] };
            const bpL = Object.fromEntries((bprofsL||[]).map((p)=>[p.id, p]));
            const loanOutByBook = {};
            (asLender||[]).forEach((l) => { loanOutByBook[l.book_id] = { loanId: l.id, borrower: bpL[l.borrower_id] }; });
            setBooks((myBooks || []).map((b)=>({ ...b, loanOut: loanOutByBook[b.id] || null })));
          }

          const { data: asBorrower } = await sb.from("book_loans").select("*").eq("borrower_id", sid).eq("status", "active");
          const brBookIds = (asBorrower||[]).map((l)=>l.book_id);
          const lenderIdsBR = [...new Set((asBorrower||[]).map((l)=>l.lender_id))];
          const { data: brBooksRows } = brBookIds.length ? await sb.from("books").select("*").in("id", brBookIds) : { data: [] };
          const { data: lprofsBR } = lenderIdsBR.length ? await sb.from("profiles").select("*").in("id", lenderIdsBR) : { data: [] };
          const lm = Object.fromEntries((lprofsBR||[]).map((p)=>[p.id, p]));
          const brById = Object.fromEntries((brBooksRows||[]).map((b)=>[b.id, b]));
          setBorrowedItems((asBorrower||[]).map((l)=>({
            loanId: l.id,
            book: brById[l.book_id],
            lender: lm[l.lender_id],
          })).filter((x)=>x.book && x.lender));

          const { data: allFr, error: fe } = await sb.from("friendships").select("*").or(`requester_id.eq.${sid},addressee_id.eq.${sid}`);
          if (fe) toast(fe.message);
          const frRows = allFr || [];
          setFriendships(frRows);

          const acceptedIds = [];
          frRows.filter(f=>f.status==="accepted").forEach(f=>{
            if (f.requester_id===sid) acceptedIds.push(f.addressee_id);
            else acceptedIds.push(f.requester_id);
          });

          const inc = [];
          const out = [];
          frRows.forEach(f=>{
            if (f.status !== "pending") return;
            if (f.addressee_id===sid) inc.push({ ...f, requester: null });
            else if (f.requester_id===sid) out.push(f);
          });
          const needIds = inc.map(r=>r.requester_id).filter(Boolean);
          const { data: reqs } = needIds.length ? await sb.from("profiles").select("*").in("id", needIds) : { data: [] };
          const rqMap = {};
          (reqs||[]).forEach(r=>{ rqMap[r.id]=r; });
          setIncoming(inc.map(r=>({ ...r, requester: rqMap[r.requester_id] })).filter(r=>r.requester));
          setOutgoing(out);

          let friendProfiles = [];
          if (acceptedIds.length) {
            const { data: fps } = await sb.from("profiles").select("*").in("id", acceptedIds);
            friendProfiles = fps || [];
          }
          setFriends(friendProfiles);

          const { data: allP } = await sb.from("profiles").select("*").neq("id", sid);
          setDiscover(allP||[]);
        } catch (fatal) {
          console.error("[Shelfmade] loadAll", fatal);
          const m = fatal && fatal.message ? fatal.message : String(fatal);
          setProfile(null);
          setBooks([]); setBorrowedItems([]);
          setDataGateBlocked({ kind:"exception", hint:"Beim Laden deines Regals trat ein Fehler auf.", tech: m });
        } finally {
          setLoadingApp(false);
        }
      }, [sb, toast]);

      useEffect(() => {
        let unsub = () => {};
        (async () => {
          const recoveryFromUrl = urlIndicatesPasswordRecovery();
          if (recoveryFromUrl) setPasswordRecovery(true);
          try {
            const resp = await sb.auth.getSession();
            const sess = resp && resp.data ? resp.data.session : null;
            const errObj = resp && resp.error ? resp.error : null;
            if (errObj) {
              console.warn("[Shelfmade] getSession:", errObj);
              setAuthInitError(errObj.message || "Die Sitzung konnte nicht gelesen werden.");
              setSession(null);
              setLoadingApp(false);
            } else {
              setSession(sess);
              if (!sess) setLoadingApp(false);
            }
          } catch (e) {
            console.warn("[Shelfmade] getSession threw", e);
            setAuthInitError(e.message || String(e));
            setSession(null);
            setLoadingApp(false);
          }

          try {
            const {
              data: { subscription },
            } = sb.auth.onAuthStateChange((event, s) => {
              setAuthInitError(null);
              setSession(s);
              if (event === "PASSWORD_RECOVERY" || urlIndicatesPasswordRecovery()) {
                setPasswordRecovery(true);
              }
            });
            unsub = () => subscription.unsubscribe();
          } catch (subErr) {
            console.warn("[Shelfmade] onAuthStateChange", subErr);
            setAuthInitError((prev) => prev || (subErr.message || String(subErr)));
          }
          setAuthSessionHydrated(true);
        })();
        return () => unsub();
      }, [sb]);

      useEffect(() => {
        if (!session?.user?.id) {
          setDataGateBlocked(null);
        }
      }, [session?.user?.id]);

      useEffect(() => {
        if (passwordRecovery && session?.user?.id) {
          setLoadingApp(false);
          return;
        }
        if (session?.user?.id) {
          setLoadingApp(true);
          loadAll(session.user.id);
        } else {
          setProfile(null);
          setBooks([]);
          setBorrowedItems([]);
          setLendTargetBook(null);
          setFriends([]);
          setDiscover([]);
          setFriendships([]);
          setIncoming([]);
          setOutgoing([]);
          setLoadingApp(false);
          setPasswordRecovery(false);
        }
      }, [session?.user?.id, loadAll, passwordRecovery]);

      const userObj = profileToUser(profile);
      const friendCount = friends.length;

      const addBookDb = async (b) => {
        const uid = session.user.id;
        const row = {
          user_id: uid,
          title: b.title,
          author: b.author,
          year: b.year ?? 0,
          link: b.link || null,
          cover_url: b.cover_url || null,
          open_library_work_key: normalizeOpenLibraryWorkKey(b.work_key || b.open_library_work_key),
          rating: null,
        };
        let resp = await sb.from("books").insert(row).select().single();
        if (resp.error && /open_library_work_key|schema cache|column/i.test(resp.error.message || "")) {
          const { open_library_work_key, ...rowWithoutWorkKey } = row;
          resp = await sb.from("books").insert(rowWithoutWorkKey).select().single();
        }
        const { data, error } = resp;
        if (error) { toast(error.message); return false; }
        setBooks(prev => [data, ...prev]);
        toast(`${data.title} hinzugefügt`);
        return true;
      };

      const updateBookRating = async (bookId, rating) => {
        const uid = session.user.id;
        const { error } = await sb.from("books").update({ rating }).eq("id", bookId).eq("user_id", uid);
        if (error) toast(error.message);
        else setBooks(prev => prev.map(x => x.id === bookId ? { ...x, rating } : x));
      };

      const returnLoan = async (loanId) => {
        const { error } = await sb.from("book_loans").update({
          status: "returned",
          returned_at: new Date().toISOString(),
        }).eq("id", loanId);
        if (error) toast(error.message);
        else {
          toast("Leihe beendet.");
          loadAll(session.user.id);
        }
      };

      const removeBookDb = async (id) => {
        const { data: act } = await sb.from("book_loans").select("id").eq("book_id", id).eq("status", "active").maybeSingle();
        if (act) { toast("Buch ist verliehen – zuerst „Leihe beenden“."); return; }
        const { error } = await sb.from("books").delete().eq("id", id);
        if (error) toast(error.message);
        else { setBooks(prev=>prev.filter(x=>x.id!==id)); toast("Buch entfernt"); }
      };

      const signOut = async () => {
        try {
          await sb.auth.signOut();
          setPage("profile");
          setDataGateBlocked(null);
        } catch (e) {
          toast(e.message || String(e));
        }
      };

      if (!session) {
        if (!authSessionHydrated) {
          return <ShellLoadingOverlay subtitle="Sitzung wird geprüft…"/>;
        }
        return (
          <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, minHeight:"100vh" }}>
            {authInitError ? (
              <div style={{
                padding:18, margin:"max(24px, 4vw)",
                marginBottom:0,
                borderRadius:"16px",
                border:`2px solid ${"#e8847a"}70`,
                background:P.surfaceDark,
                color:P.cream,
                fontSize:14,
                lineHeight:1.55,
                whiteSpace:"pre-wrap",
              }}>
                <strong style={{ color:"#faa" }}>Anmeldungs-Speicher konnte nicht geladen werden.</strong><br/>
                Du kannst trotzdem versuchen, dich anzumelden. Technische Meldung: {authInitError}
              </div>
            ) : null}
            <AuthScreen
              sb={sb}
              toast={toast}
              onAuthed={() =>
                sb.auth.getSession().then(({ data: { session: next } }) => {
                  setAuthInitError(null);
                  setSession(next);
                }).catch(() => {})
              }
            />
            {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={false}/>}
          </div>
        );
      }

      if (passwordRecovery) {
        return (
          <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, minHeight:"100vh" }}>
            <PasswordRecoveryScreen
              sb={sb}
              toast={toast}
              onDone={() => {
                setPasswordRecovery(false);
                setLoadingApp(true);
                loadAll(session.user.id);
              }}
            />
            {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={false}/>}
          </div>
        );
      }

      if (session?.user?.id && !loadingApp && !profile && !passwordRecovery) {
        const g = dataGateBlocked || {};
        let title = "Regal konnte nicht geladen werden";
        if (g.kind === "missing_profile") title = "Kein Nutzerprofil in der Datenbank";
        else if (g.kind === "profile_query") title = "Profilabfrage fehlgeschlagen";
        else if (g.kind === "exception") title = "Unerwarteter Fehler beim Laden";
        else title = "Regal konnte nicht angezeigt werden";
        const hintText = g.hint ||
          "Nach dem Laden fehlen Profil-/Regaldaten für dein Supabase‑Konto. Bitte Datenbank‑Schema oder Rechte prüfen, neu laden oder abmelden.";
        return (
          <SessionDataBlockedLayer
            accent={theme.accent}
            title={title}
            hint={hintText}
            tech={g.tech || null}
            sessionEmail={(session.user && session.user.email) || ""}
            onRetry={() => { setLoadingApp(true); loadAll(session.user.id); }}
            onSignOut={() => signOut()}
            detail={
              "Wenn dies nach einem neuen Deploy passiert ist: bestehende User bleiben in auth.users — prüfe, ob migrations/schema das Profil anlegt oder ob der anon‑Key weiterhin passt."}
          />
        );
      }

      if (loadingApp || !userObj) {
        return (
          <div style={{ background:P.bg, minHeight:"100vh", fontFamily:"'Crimson Pro',Georgia,serif", color:P.cream }}>
            <ShellLoadingOverlay subtitle={"Regal und Freundeslisten werden geladen…"}/>
            {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={isMobile}/>}
          </div>
        );
      }

      const navItems = [
        { id:"profile", label:"Regal",   icon:"book" },
        { id:"friends", label:"Freunde", icon:"users" },
        { id:"groups",  label:"Gruppen", icon:"grid" },
      ];

      return (
        <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, color:P.cream, minHeight:"100vh", position:"relative" }}>
          {!isMobile && (
            <>
          <div style={{ position:"fixed", top:60, left:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="left" height={200}/></div>
          <div style={{ position:"fixed", top:100, right:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="right" height={160}/></div>
          <div style={{ position:"fixed", bottom:0, left:10, zIndex:0, opacity:0.3, pointerEvents:"none" }}><Vine side="left" height={140}/></div>
            </>
          )}

          <nav style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            gap:isMobile ? 8 : undefined,
            padding:isMobile ? "8px max(14px, env(safe-area-inset-right)) 8px max(14px, env(safe-area-inset-left))"
              : "0 28px",
            paddingTop:isMobile ? "max(8px, env(safe-area-inset-top))" : undefined,
            minHeight:isMobile ? "48px" : "56px",
            boxSizing:"border-box",
            background:`${P.surface}E8`, backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
            borderBottom:`1px solid ${P.cream}10`,
            position:"sticky", top:0, zIndex:100,
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", flexShrink:0, minWidth:0 }}>
              <Ghost size={isMobile ? 22 : 26}/>
              <span style={{ fontSize:isMobile ? "16px" : "18px", fontWeight:800, color:P.cream, letterSpacing:"-0.3px" }}>Shelfmade</span>
            </div>
            {!isMobile && (
            <div style={{ display:"flex", gap:"2px", flex:1, justifyContent:"center", flexWrap:"wrap" }}>
              {navItems.map(n=>(
                <button key={n.id} type="button" onClick={()=>setPage(n.id)} style={{
                  padding:"7px 16px", borderRadius:"10px",
                  fontSize:"14px", fontWeight:page===n.id?700:400,
                  color:page===n.id?P.cream:P.textMuted,
                  background:page===n.id?`${P.cream}12`:"transparent",
                  border:"none", cursor:"pointer", transition:"all 0.2s",
                  fontFamily:"'Crimson Pro',Georgia,serif",
                  display:"flex", alignItems:"center", gap:"6px",
                }}>
                  <Icon name={n.icon} size={15} color={page===n.id?P.cream:P.textMuted}/> {n.label}
                </button>
              ))}
            </div>
            )}
            <div style={{ display:"flex", alignItems:"center", gap:isMobile ? 6 : 10, flexShrink:0 }}>
              <button type="button" onClick={signOut} style={{ background:"none", border:"none", color:P.textMuted, cursor:"pointer",
                fontSize:isMobile ? 11 : 12, fontFamily:"inherit", whiteSpace:"nowrap" }}>Abmelden</button>
              <Avatar initials={userObj.initials} size={isMobile ? 28 : 32} accent={theme.accent}/>
            </div>
          </nav>

          <div style={{ position:"relative", zIndex:1 }}>
            {page==="profile" && (
              <ProfilePage
                user={userObj}
                books={books}
                borrowedItems={borrowedItems}
                friendCount={friendCount}
                accent={theme.accent}
                cardBg={theme.card}
                onRemoveBook={removeBookDb}
                onRateBook={updateBookRating}
                onOpenAdd={()=>setShowAddBook(true)}
                themeKey={themeKey}
                onSetTheme={setThemeKey}
                onReturnLoan={returnLoan}
                onLendBook={(b)=>setLendTargetBook(b)}
                onAddSuggestedBook={addBookDb}
                toast={toast}
                sb={sb}
                onReloadShelf={() => loadAll(session.user.id)}
              />
            )}
            {page==="friends" && (
              <FriendsPage accent={theme.accent} cardBg={theme.card} currentProfile={profile}
                friends={friends} discover={discover} friendships={friendships} incoming={incoming} outgoing={outgoing}
                onRefresh={()=>loadAll(session.user.id)} sb={sb} toast={toast}/>
            )}
            {page==="groups" && (
              <GroupsPage
                accent={theme.accent}
                cardBg={theme.card}
                sb={sb}
                toast={toast}
                currentUserId={session.user.id}
                visible={page==="groups"}
              />
            )}
          </div>

          {showAddBook && <AddBookModal onClose={()=>setShowAddBook(false)} onAddBook={addBookDb} accent={theme.accent}/>}
          {lendTargetBook && (
            <LendBookModal
              accent={theme.accent}
              bookTitle={lendTargetBook.title}
              friends={friends}
              onClose={()=>setLendTargetBook(null)}
              onPickFriend={async (friendId) => {
                const { error } = await sb.from("book_loans").insert({
                  book_id: lendTargetBook.id,
                  lender_id: session.user.id,
                  borrower_id: friendId,
                  status: "active",
                });
                if (error) toast(error.message);
                else {
                  toast("Verliehen – bei deinem Freund erscheint es als geliehen.");
                  setLendTargetBook(null);
                  loadAll(session.user.id);
                }
              }}
            />
          )}
          {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={isMobile}/>}

          {!isMobile && (
          <div style={{ position:"fixed", bottom:12, right:16, zIndex:50, opacity:0.6, pointerEvents:"none", animation:"ghostFloat 3s ease-in-out infinite" }}>
            <Ghost size={36}/>
          </div>
          )}

          {isMobile && (
            <nav aria-label="Hauptnavigation"
              style={{
                position:"fixed",
                bottom:0,
                left:0,
                right:0,
                zIndex:250,
                display:"flex",
                justifyContent:"space-around",
                alignItems:"stretch",
                gap:4,
                paddingBottom:"max(10px, env(safe-area-inset-bottom))",
                paddingTop:"8px",
                paddingLeft:"max(6px, env(safe-area-inset-left))",
                paddingRight:"max(6px, env(safe-area-inset-right))",
                background:`${P.surface}F2`,
                backdropFilter:"blur(18px)",
                WebkitBackdropFilter:"blur(18px)",
                borderTop:`1px solid ${P.cream}14`,
                boxShadow:"0 -6px 32px rgba(0,0,0,0.2)",
              }}>
              {navItems.map((n)=>(
                <button key={n.id} type="button" aria-current={page===n.id ? "page" : undefined}
                  onClick={()=>setPage(n.id)}
                  style={{
                    flex:1,
                    display:"flex",
                    flexDirection:"column",
                    alignItems:"center",
                    justifyContent:"center",
                    gap:3,
                    padding:"6px 2px",
                    borderRadius:"12px",
                    border:"none",
                    cursor:"pointer",
                    fontFamily:"'Crimson Pro',Georgia,serif",
                    background:page===n.id ? `${P.cream}14` : "transparent",
                    color:page===n.id ? P.cream : P.textMuted,
                    fontWeight:page===n.id ? 700 : 500,
                    fontSize:10,
                  }}>
                  <Icon name={n.icon} size={20} color={page===n.id ? P.cream : P.textMuted}/>
                  <span style={{ letterSpacing:n.label.length > 8 ? "-0.2px" : 0 }}>{n.label}</span>
                </button>
              ))}
            </nav>
          )}
        </div>
      );
    }

    function App() {
      const sdkMissing = useMemo(() => {
        try {
          const mod = typeof supabase !== "undefined" ? supabase : globalThis.supabase;
          return !mod?.createClient;
        } catch (_) {
          return true;
        }
      }, []);

      const validationMessages = useMemo(() => validateSupabaseProjectConfig(), []);

      const sb = useMemo(() => {
        try {
          return createSb();
        } catch (e) {
          console.warn("Shelfmade: init failed", e);
          return null;
        }
      }, []);

      if (!sb) return (
        <div style={{ background:P.bg, minHeight:"100vh" }}>
          <ConfigScreen validationMessages={validationMessages} supabaseSdkMissing={sdkMissing}/>
          <CookieConsentBanner/>
        </div>
      );
      return (
        <>
          <MainApp sb={sb}/>
          <CookieConsentBanner/>
        </>
      );
    }

    (function bootstrapShelfmade() {
      try {
        const container = document.getElementById("root");
        if (!container) {
          document.body.insertAdjacentHTML("beforeend",
            "<p style=\"padding:24px;color:#F2E6D9\">Shelfmade: #root fehlt — index.html musste einmalig deployt werden.</p>");
          return;
        }
        if (!window.React || !window.ReactDOM) {
          container.innerHTML = "<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f2e6d9;padding:28px;text-align:center;font-family:Georgia,serif;line-height:1.55\">React konnte nicht vom CDN geladen werden. Netzwerk, Privat‑Modus oder Blockierer prüfen; danach Neu laden.</div>";
          return;
        }
        if (!window.ReactDOM.createRoot) {
          container.innerHTML = "<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f2e6d9;padding:28px;text-align:center;font-family:Georgia,serif\">ReactDOM ohne createRoot — bitte React 18 UMD laden.</div>";
          return;
        }
        window.ReactDOM.createRoot(container).render(<ErrorBoundary><App/></ErrorBoundary>);
      } catch (bootErr) {
        console.error("[Shelfmade] bootstrap", bootErr);
        const box = document.getElementById("root");
        const msg = bootErr && bootErr.message ? bootErr.message : String(bootErr);
        const safe = msg.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
        const inner =
          `<div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px;box-sizing:border-box;background:#6B7D6B;color:#F2E6D9;font-family:'Crimson Pro',Georgia,serif;text-align:center">`+
          `<h1 style="font-size:21px;margin:0 0 12px">Start fehlgeschlagen</h1>`+
          `<p style="opacity:.92;line-height:1.55;margin:0 0 14px;max-width:480px">Beim ersten Start ist ein nicht abgefangener Fehler aufgetreten.</p>`+
          `<pre style="text-align:left;font-size:12px;overflow:auto;width:100%;max-width:480px;background:#3a2922;padding:12px;border-radius:10px;line-height:1.4">${safe}</pre>`+
          `<button type="button" onclick="location.reload()" style="margin-top:22px;padding:11px 20px;font-weight:700;border:none;border-radius:10px;background:#D4B05E;color:#4A2A1F;cursor:pointer;font-family:inherit">Neu laden</button></div>`;
        if (box) box.innerHTML = inner;
        else document.body.insertAdjacentHTML("beforeend", inner);
      }
    })();
  </script>

  <!-- Kein Babel: zeigt nach Timeout einen Hinweis, falls Skripte nicht laufen -->
  <script>
    window.setTimeout(function shelfmadeBootWatch() {
      var boot = document.getElementById("sm-static-boot");
      if (!boot || !boot.isConnected) return;
      boot.style.flexDirection = "column";
      boot.style.gap = "14px";
      boot.style.padding = "28px 20px";
      boot.innerHTML =
        "<strong style=\"font-size:17px;display:block;margin-bottom:6px\">Die App startet nicht</strong>"+
        "<span style=\"opacity:.93;font-size:14px;line-height:1.55;display:block;margin-bottom:8px\">"+
        "Typisch: JSX‑Runtime („react/jsx-runtime“) im Browser ohne Bundler, oder Skripte von CDN blockiert "+
        "(cdn.jsdelivr.net / cdnjs cloudflare.com). Konsole&nbsp;(F12) und Tab <strong>Netzwerk</strong> prüfen.</span>"+
        "<button type=\"button\" onclick=\"location.reload()\" style=\"margin-top:8px;padding:10px 18px;font-weight:700;font-family:inherit;border:none;border-radius:10px;background:#D4B05E;color:#4A2A1F;cursor:pointer\">Neu laden</button>";
    }, 14000);
  </script>
</body>
</html>
