<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shelfmade – Cozy Haunted Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #6B7D6B;
      --surface: #A0523C;
      --surface-light: #B8654E;
      --surface-dark: #8B4533;
      --brick: #6B3A2E;
      --brick-dark: #4A2A1F;
      --cream: #F2E6D9;
      --cream-dark: #EDD8C8;
      --ghost: #F5E8DC;
      --ghost-pink: #F0D5C5;
      --gold: #C4A24E;
      --gold-light: #D4B05E;
      --sage: #8A9A7E;
      --sage-dark: #6B7D6B;
      --foliage: #3E5C3E;
      --foliage-light: #5A7A5A;
      --text: #F2E6D9;
      --text-muted: #D4B8A0;
      --text-dim: #A08070;
      --overlay: rgba(74,42,31,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
    }
    ::placeholder { color: var(--text-dim); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

    @keyframes ghostFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes scanMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    html { -webkit-text-size-adjust: 100%; }
    #root { min-height: 100dvh; }
    button, [role="button"] { -webkit-tap-highlight-color: rgba(242,230,217,0.12); touch-action: manipulation; }

    .sm-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* Gruppen-Detail kann breiter sein – max-width wird per Klasse ergänzt */
    .sm-page.sm-page-groups-detail { max-width: 960px; }

    .sm-profile-head {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 36px;
    }

    .sm-stack-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sm-grid {
      display: grid;
      gap: 14px;
    }

    .sm-grid-3cols { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .sm-grid-2cols { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }

    .sm-grid-groupbooks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .sm-groups-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 640px) {
      .sm-page {
        padding: 16px 14px calc(88px + env(safe-area-inset-bottom, 0px)) 14px;
      }

      .sm-profile-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 24px;
      }

      .sm-grid-3cols {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .sm-grid-2cols {
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
      }

      .sm-grid-groupbooks {
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
      }

      /* Modals wie Bottom-Sheets – besser thumb-erreichbar */
      .sm-modal-overlay {
        align-items: flex-end !important;
        justify-content: center !important;
        padding: 0 !important;
      }

      .sm-modal-panel {
        max-height: min(92dvh, 92vh) !important;
        border-radius: 22px 22px 0 0 !important;
        max-width: 100% !important;
        width: 100% !important;
        padding-bottom: max(28px, calc(24px + env(safe-area-inset-bottom))) !important;
      }

      .sm-profile-head h1 {
        font-size: clamp(22px, 5.8vw, 28px);
        word-break: break-word;
      }

      .sm-request-row {
        flex-wrap: wrap !important;
        gap: 8px !important;
      }

      .sm-invite-controls {
        flex-direction: column !important;
        align-items: stretch !important;
      }

      .sm-search-hit {
        flex-direction: column !important;
        align-items: stretch !important;
      }
    }

    @media (max-width: 380px) {
      .sm-grid-3cols {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>

    /** ≤640px: Tab-Leiste unten, kompakte Layouts */
    function useMobileLayout() {
      const mq = "(max-width: 640px)";
      const [isMobile, setIsMobile] = useState(() => typeof window !== "undefined" && window.matchMedia(mq).matches);
      useEffect(() => {
        const m = window.matchMedia(mq);
        const handler = () => setIsMobile(m.matches);
        m.addEventListener("change", handler);
        setIsMobile(m.matches);
        return () => m.removeEventListener("change", handler);
      }, []);
      return isMobile;
    }

    /** Cover-URL aus Open-Library-Suchtreffer (covers.openlibrary.org) */
    function openLibraryCoverUrl(doc) {
      if (doc.cover_i)
        return `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
      let raw = [];
      if (Array.isArray(doc.isbn) && doc.isbn.length) raw = doc.isbn;
      else {
        if (doc.isbn_13) raw.push(doc.isbn_13);
        if (doc.isbn_10) raw.push(doc.isbn_10);
      }
      if (raw.length) {
        const clean = (s) => String(s).replace(/[^0-9Xx]/g, "");
        const ten = raw.map(clean).find((x) => x.length === 10);
        const thirteen = raw.map(clean).find((x) => x.length === 13);
        const isbn = thirteen || ten;
        if (isbn) return `https://covers.openlibrary.org/isbn/${isbn}-M.jpg`;
      }
      return null;
    }

    /** Einzelanfrage Open Library (limit anpassbar für Live-Vorschläge) */
    async function searchOpenLibrary(query, limit = 18, signal) {
      const q = query.trim();
      if (!q) return [];
      const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=${limit}`;
      const res = await fetch(url, signal ? { signal } : undefined);
      if (!res.ok) throw new Error("Open Library antwortet nicht – später bitte erneut versuchen.");
      const json = await res.json();
      const out = [];
      for (const doc of json.docs || []) {
        const titleRaw = doc.title;
        const title = Array.isArray(titleRaw) ? titleRaw[0] : titleRaw;
        if (!title || typeof title !== "string") continue;
        const author = (doc.author_name && doc.author_name[0]) || "Unbekannt";
        let year = doc.first_publish_year;
        if (year == null && Array.isArray(doc.publish_year) && doc.publish_year.length)
          year = doc.publish_year[0];
        if (year == null || typeof year !== "number") year = 0;
        const link = doc.key ? `https://openlibrary.org${doc.key}` : null;
        const cover_url = openLibraryCoverUrl(doc);
        out.push({ title, author, year, link, cover_url });
      }
      return out;
    }

    /** Mehrere Suchvarianten (Tippfehler, Teilbegriffe, Umlaute) und Ergebnisse zusammenführen */
    function buildSearchVariants(raw) {
      const q = raw.trim();
      if (!q) return [];
      const variants = new Set([q]);
      const parts = q.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) {
        variants.add(parts[0]);
        variants.add(parts[parts.length - 1]);
        variants.add(parts.slice(0, 2).join(" "));
      }
      const first = parts[0] || q;
      if (first.length >= 4) variants.add(first.slice(0, -1));
      if (first.length >= 5) variants.add(first.slice(0, -2));
      if (first.length >= 6) variants.add(first.slice(0, -3));
      const relaxed = q
        .replace(/ä/gi, "a").replace(/ö/gi, "o").replace(/ü/gi, "u")
        .replace(/ß/g, "ss");
      if (relaxed !== q) variants.add(relaxed);
      return [...variants].filter(v => v.length >= 1).slice(0, 10);
    }

    function mergeUniqueBookLists(lists) {
      const map = new Map();
      for (const list of lists) {
        for (const b of list) {
          const k = `${b.title.toLowerCase()}|${b.author.toLowerCase()}`;
          const ex = map.get(k);
          if (!ex) map.set(k, b);
          else if (!ex.cover_url && b.cover_url) map.set(k, b);
        }
      }
      return [...map.values()];
    }

    /** „Suchen“-Button: mehrere Varianten parallel (Toleranz bei Tippfehlern) */
    async function searchOpenLibrarySmart(query) {
      const base = query.trim();
      if (!base) return [];
      const variants = buildSearchVariants(base);
      const perVariantLimit = 12;
      const results = await Promise.all(
        variants.map(v => searchOpenLibrary(v, perVariantLimit).catch(() => []))
      );
      return mergeUniqueBookLists(results);
    }

    function createSb() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
      const mod = typeof supabase !== "undefined" ? supabase : globalThis.supabase;
      if (!mod?.createClient) return null;
      return mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          flowType: "pkce",
        },
      });
    }

    function getAuthRedirectUrl() {
      if (typeof window === "undefined") return "";
      try {
        const href = window.location.href.split("#")[0];
        const base = href.indexOf("?") >= 0 ? href.slice(0, href.indexOf("?")) : href;
        if (window.location.protocol === "file:") return "";
        return base;
      } catch {
        return "";
      }
    }

    const COOKIE_CONSENT_KEY = "shelfmade_privacy_accept_v1";

    /** Hinweis auf lokale Speicherung (Sessions, Einwilligung, Theme); keine Tracking-Werbecookies */
    function CookieConsentBanner({ onAccept }) {
      const [visible, setVisible] = useState(() => {
        try { return localStorage.getItem(COOKIE_CONSENT_KEY) !== "yes"; }
        catch { return true; }
      });
      if (!visible) return null;
      const accept = () => {
        try { localStorage.setItem(COOKIE_CONSENT_KEY, "yes"); } catch (_) {}
        setVisible(false);
        onAccept?.();
      };
      return (
        <div role="dialog" aria-labelledby="cookie-title" aria-describedby="cookie-desc"
          style={{
            position:"fixed", bottom:0, left:0, right:0, zIndex:10050,
            background:`${P.brickDark}f5`,
            backdropFilter:"blur(12px)",
            borderTop:`1px solid ${P.cream}20`,
            padding:"16px max(18px, env(safe-area-inset-right)) max(24px, calc(14px + env(safe-area-inset-bottom))) max(18px, env(safe-area-inset-left))",
            boxShadow:"0 -8px 40px rgba(0,0,0,0.35)",
          }}>
          <div style={{ maxWidth:860, margin:"0 auto" }}>
            <h2 id="cookie-title" style={{ fontSize:16, fontWeight:700, color:P.cream, marginBottom:8 }}>Hinweise zu Daten &amp; Browser-Speicher</h2>
            <p id="cookie-desc" style={{ fontSize:13, color:P.textMuted, lineHeight:1.55, marginBottom:14 }}>
              Shelfmade nutzt <strong style={{ color:P.cream }}>Supabase zur Anmeldung</strong>; dabei werden Sitzungsdaten überwiegend im <strong style={{ color:P.cream }}>lokalen Speicher deines Browsers</strong> abgelegt (keine klassischen Tracking-Cookies dieser App).
              Ebenso werden z.&nbsp;B. deine gewählte Farbe und diese Einwilligung lokal gespeichert.
              Ohne diese Speicherung funktioniert die Anmeldung nicht zuverlässig. Mit Akzeptieren stimmst du dieser Verwendung zu.
            </p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:10, alignItems:"center", justifyContent:"flex-end" }}>
              <Btn accent={P.goldLight} onClick={accept}>Verstanden &amp; fortfahren</Btn>
            </div>
          </div>
        </div>
      );
    }

    function initialsFrom(nameOrEmail) {
      const s = (nameOrEmail || "?").trim();
      const parts = s.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase().slice(0, 4);
      return s.slice(0, 2).toUpperCase() || "?";
    }

    function profileToUser(p) {
      if (!p) return null;
      return {
        id: p.id,
        name: p.display_name || "Leser*in",
        username: "@" + (p.username || ""),
        initials: initialsFrom(p.display_name || p.username || ""),
      };
    }

    /* ========== SVG & UI ========== */
    function Ghost({ size = 40, color = P.ghost, blush = P.ghostPink, style: s }) {
      return (
        <svg width={size} height={size} viewBox="0 0 60 66" fill="none" style={{ display:"block", ...s }}>
          <path d="M30 4C16 4 6 16 6 28v28c0 0 4-6 8-2s4 8 8 4 4-8 8-4 4 6 8 2 4-8 8-4 6 4 8 2V28C54 16 44 4 30 4z" fill={color}/>
          <ellipse cx="22" cy="28" rx="3" ry="3.5" fill={P.brickDark}/>
          <ellipse cx="38" cy="28" rx="3" ry="3.5" fill={P.brickDark}/>
          <ellipse cx="16" cy="34" rx="4" ry="2.5" fill={blush} opacity="0.5"/>
          <ellipse cx="44" cy="34" rx="4" ry="2.5" fill={blush} opacity="0.5"/>
        </svg>
      );
    }

    function Vine({ side = "left", height = 120 }) {
      const flip = side === "right" ? "scaleX(-1)" : "";
      const pts = [0.15, 0.35, 0.55, 0.75];
      return (
        <svg width="30" height={height} viewBox={`0 0 30 ${height}`} fill="none" style={{ display:"block", transform:flip, opacity:0.5 }}>
          <path d={`M15 0 C10 ${height*.2} 20 ${height*.35} 12 ${height*.5} C5 ${height*.65} 22 ${height*.8} 15 ${height}`} stroke={P.foliageLight} strokeWidth="2.5" fill="none"/>
          {pts.map((t,i) => (
            <ellipse key={i} cx={i%2===0?8:22} cy={height*t} rx="6" ry="4" fill={P.foliageLight} opacity="0.7"
              transform={`rotate(${i%2===0?-20:20} ${i%2===0?8:22} ${height*t})`}/>
          ))}
        </svg>
      );
    }

    function BookFrame({ letter, accent }) {
      return (
        <svg width="56" height="72" viewBox="0 0 56 72" fill="none" style={{ display:"block" }}>

    function Icon({ name, size = 18, color = P.cream }) {
      const icons = {
        search:  <><circle cx="11" cy="11" r="7" stroke={color} strokeWidth="1.8" fill="none"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        plus:    <><line x1="12" y1="5" x2="12" y2="19" stroke={color} strokeWidth="1.8" strokeLinecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        x:       <><line x1="6" y1="6" x2="18" y2="18" stroke={color} strokeWidth="1.8" strokeLinecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        book:    <><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15z" stroke={color} strokeWidth="1.8" fill="none"/></>,
        users:   <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke={color} strokeWidth="1.8" fill="none"/><circle cx="9" cy="7" r="4" stroke={color} strokeWidth="1.8" fill="none"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke={color} strokeWidth="1.8" fill="none"/></>,
        grid:    <><rect x="3" y="3" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/></>,
        camera:  <><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke={color} strokeWidth="1.8" fill="none"/><circle cx="12" cy="13" r="4" stroke={color} strokeWidth="1.8" fill="none"/></>,
        link:    <><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/></>,
        check:   <><polyline points="20 6 9 17 4 12" stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></>,
        chevron: <><polyline points="9 18 15 12 9 6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></>,
        palette: <><circle cx="13.5" cy="6.5" r="2" fill={color} opacity="0.4"/><circle cx="17.5" cy="10.5" r="2" fill={color} opacity="0.4"/><circle cx="8.5" cy="7.5" r="2" fill={color} opacity="0.4"/><circle cx="6.5" cy="12" r="2" fill={color} opacity="0.4"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.04-.23-.29-.38-.63-.38-1.04 0-.83.67-1.5 1.5-1.5H16c3.31 0 6-2.69 6-6 0-5.17-4.49-9-10-9z" stroke={color} strokeWidth="1.8" fill="none"/></>,
        trash:   <><polyline points="3 6 5 6 21 6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" stroke={color} strokeWidth="1.8" fill="none"/><path d="M10 11v6M14 11v6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/></>,
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display:"block", flexShrink:0 }}>{icons[name]}</svg>;
    }

    function Avatar({ initials, size = 40, accent }) {
      return (
        <div style={{
          width:size, height:size, borderRadius:"50%",
          background: accent||P.brick,
          border:`2px solid ${P.goldLight}40`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:size*0.32, fontWeight:700, color:P.cream,
          fontFamily:"'Crimson Pro',Georgia,serif", flexShrink:0,
        }}>{initials}</div>
      );
    }

    function Btn({ children, variant="primary", accent, onClick, style:s, small, disabled }) {
      const [h, setH] = useState(false);
      const bg = variant==="primary" ? (accent||P.goldLight) : variant==="secondary" ? `${P.cream}15` : "transparent";
      const clr = variant==="primary" ? P.brickDark : P.cream;
      return (
        <button disabled={disabled} style={{
          padding: small?"6px 14px":"10px 20px", borderRadius:"12px",
          fontSize: small?"13px":"14px", fontWeight:600,

    function AuthScreen({ sb, onAuthed, toast }) {
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [displayName, setDisplayName] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const [forgotSent, setForgotSent] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setErr("");
        setBusy(true);
        try {
          if (mode === "forgot") {
            const redir = getAuthRedirectUrl();
            if (!redir || redir.startsWith("file:")) {
              setErr('Passwort-Link braucht eine http(s)-URL. Seite über einen kleinen Server öffnen (z. B. „Live Server“) oder in Supabase die Site-URL auf deine Online-Adresse setzen.');
              return;
            }
            const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
              redirectTo: redir,
            });
            if (error) throw error;
            setForgotSent(true);
            toast?.("Falls diese E-Mail existiert, erhältst du einen Link zum Zurücksetzen.");
          } else if (mode === "signup") {
            const { error } = await sb.auth.signUp({
              email, password,
              options: { data: { display_name: displayName.trim() || undefined } },
            });
            if (error) throw error;
            onAuthed();
          } else {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onAuthed();

          setErr(x.message || String(x));
        } finally {
          setBusy(false);
        }

            {(mode === "login" || mode === "signup") && (

            style={{ marginTop:16, background:"none", border:"none", color:P.goldLight, cursor:"pointer", width:"100%", fontFamily:"inherit", fontSize:14 }}>

    function PasswordRecoveryScreen({ sb, onDone, toast }) {
      const [pw, setPw] = useState("");
      const [pw2, setPw2] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const inp = { width:"100%", padding:"12px 14px", borderRadius:"12px", border:`1.5px solid ${P.cream}20`,

      const submit = async (e) => {
        e.preventDefault();
        setErr("");
        if (!pw || pw.length < 6) { setErr("Passwort mindestens 6 Zeichen."); return; }
        if (pw !== pw2) { setErr("Die Passwörter stimmen nicht überein."); return; }
        setBusy(true);
        try {
          const { error } = await sb.auth.updateUser({ password: pw });
          if (error) throw error;
          toast?.("Neues Passwort gespeichert.");
          await sb.auth.refreshSession();
          onDone?.();
        } catch (x) {
          setErr(x.message || String(x));
        } finally {
          setBusy(false);
        }
      };
      return (
        <div style={{ maxWidth:400, margin:"48px auto", padding:24 }}>
          <Ghost size={40} style={{ margin:"0 auto 16px" }}/>

          <p style={{ fontSize:13, color:P.textMuted, marginBottom:20, lineHeight:1.5 }}>
            Gib ein neues Passwort ein (nach dem Reset-Link aus der E-Mail).
          </p>
          <form onSubmit={submit}>
            <input style={inp} type="password" autoComplete="new-password" placeholder="Neues Passwort" value={pw} onChange={e=>setPw(e.target.value)}/>
            <input style={inp} type="password" autoComplete="new-password" placeholder="Passwort wiederholen" value={pw2} onChange={e=>setPw2(e.target.value)}/>
            {err && <p style={{ color:"#e88", fontSize:13, marginBottom:12 }}>{err}</p>}
            <Btn accent={P.goldLight} disabled={busy} style={{ width:"100%", justifyContent:"center" }}>
              {busy ? "Speichern…" : "Passwort speichern"}
            </Btn>
          </form>
        </div>
      );
    }

    function AddBookModal({ onClose, onAddBook, accent }) {
      const [tab, setTab] = useState("search");
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchErr, setSearchErr] = useState("");
      const [suggestions, setSuggestions] = useState([]);
      const [suggestLoading, setSuggestLoading] = useState(false);
      const [suggestOpen, setSuggestOpen] = useState(false);
      const blurTimer = useRef(null);
      const [scanning, setScanning] = useState(false);
      const [scanResult, setScanResult] = useState(null);
      const [scanMiss, setScanMiss] = useState(false);

      useEffect(() => {
        if (tab !== "search") {
          setSuggestions([]);
          setSuggestOpen(false);
        }
      }, [tab]);

      /* Live-Vorschläge beim Tippen (kurz warten, damit die API nicht flutet) */
      useEffect(() => {
        if (tab !== "search") return;
        const q = query.trim();
        if (q.length < 2) {
          setSuggestions([]);
          setSuggestLoading(false);
          return;
        }
        setSuggestLoading(true);
        const ac = new AbortController();
        const t = setTimeout(async () => {
          try {
            const list = await searchOpenLibrary(q, 10, ac.signal);
            setSuggestions(list.slice(0, 8));
          } catch (e) {
            if (e.name !== "AbortError") setSuggestions([]);
          } finally {
            setSuggestLoading(false);
          }
        }, 350);
        return () => { clearTimeout(t); ac.abort(); };
      }, [query, tab]);

      const handleSearch = async () => {
        if (!query.trim()) return;
        setSuggestOpen(false);
        setSearching(true);
        setSearchErr("");
        setResults([]);
        try {
          const list = await searchOpenLibrarySmart(query);
          setResults(list);
          if (list.length === 0) setSearchErr("Nichts gefunden – anderen Suchbegriff probieren.");
        } catch (e) {
          setSearchErr(e.message || "Suche fehlgeschlagen.");
          setResults([]);
        } finally {
          setSearching(false);
        }
      };

      const pickSuggestion = (b) => {
        setQuery(b.title);
        setResults([b]);
        setSuggestions([]);
        setSuggestOpen(false);
        setSearchErr("");
      };

      const handleScan = async () => {
        setScanning(true);
        setScanResult(null);
        setScanMiss(false);
        await new Promise(r => setTimeout(r, 1900));
        try {
          const seed = query.trim() || "novel";
          const list = await searchOpenLibrarySmart(seed);
          const pick = list.length ? list[Math.floor(Math.random() * Math.min(list.length, 12))] : null;
          setScanResult(pick);
          setScanMiss(!pick);
        } catch {
          setScanResult(null);
          setScanMiss(true);
        } finally {
          setScanning(false);
        }
      };

      const inputStyle = {
        width:"100%", padding:"10px 14px 10px 38px", borderRadius:"12px",
        border:`1.5px solid ${P.cream}20`, background:P.surfaceDark,
        fontSize:"14px", outline:"none", boxSizing:"border-box",
        fontFamily:"'Crimson Pro',Georgia,serif", color:P.cream,
      };

      return (
        <Modal onClose={onClose} title="Buch hinzufügen">
          <div style={{ display:"flex", gap:"3px", padding:"3px", background:P.surfaceDark, borderRadius:"14px", marginBottom:"24px" }}>
            {[{id:"search",label:"Suche",icon:"search"},{id:"camera",label:"Foto-Scan",icon:"camera"}].map(t=>(
              <button key={t.id} type="button" onClick={()=>setTab(t.id)} style={{
                flex:1, padding:"9px", borderRadius:"11px", fontSize:"13px", fontWeight:600,
                background:tab===t.id?P.surface:"transparent",
                color:tab===t.id?P.cream:P.textMuted,
                border:tab===t.id?`1px solid ${P.cream}15`:"1px solid transparent",
                cursor:"pointer", transition:"all 0.2s",
                fontFamily:"'Crimson Pro',Georgia,serif",
                display:"flex", alignItems:"center", justifyContent:"center", gap:"6px",
              }}>
                <Icon name={t.icon} size={14} color={tab===t.id?P.cream:P.textMuted}/> {t.label}
              </button>
            ))}
          </div>

          {tab==="search" && (
            <>
              <div style={{ display:"flex", gap:"8px", marginBottom:"8px" }}>
                <div style={{ flex:1, position:"relative" }}>
                  <div style={{ position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)", zIndex:2, pointerEvents:"none" }}>
                    <Icon name="search" size={15} color={P.textDim}/>
                  </div>
                  <input
                    style={inputStyle}
                    placeholder="Titel oder Autor tippen – Vorschläge erscheinen automatisch"
                    value={query}
                    autoComplete="off"
                    onChange={e=>{ setQuery(e.target.value); setSuggestOpen(true); }}
                    onFocus={()=> setSuggestOpen(true)}
                    onBlur={()=>{
                      blurTimer.current = setTimeout(()=> setSuggestOpen(false), 200);
                    }}
                    onKeyDown={e=>{
                      if (e.key==="Enter" && !searching) {
                        e.preventDefault();
                        if (blurTimer.current) clearTimeout(blurTimer.current);
                        handleSearch();
                      }
                    }}
                  />

    function mergeGroupBooksByTitleAuthor(books, getProfile) {
      const keyOf = (b) => `${String(b.title).trim().toLowerCase()}|${String(b.author).trim().toLowerCase()}`;
      const map = new Map();
      for (const b of books) {
        const owner = getProfile(b.user_id);
        if (!owner) continue;
        const k = keyOf(b);
        if (!map.has(k)) {
          map.set(k, {
            title: b.title,
            author: b.author,
            year: b.year,
            link: b.link,
            cover_url: b.cover_url || null,
            owners: [owner],
          });
        } else {
          const e = map.get(k);
          if (!e.owners.find((o) => o.id === owner.id)) e.owners.push(owner);
          if (!e.cover_url && b.cover_url) e.cover_url = b.cover_url;
        }
      }
      return [...map.values()];
    }

    function GroupsPage({ accent, cardBg, sb, toast, currentUserId, visible }) {
      const [groups, setGroups] = useState([]);
      const [loading, setLoading] = useState(true);
      const [detailGroup, setDetailGroup] = useState(null);
      const [mergedBooks, setMergedBooks] = useState([]);
      const [booksLoading, setBooksLoading] = useState(false);
      const [showCreate, setShowCreate] = useState(false);
      const [newName, setNewName] = useState("");
      const [newDesc, setNewDesc] = useState("");

      const loadGroups = useCallback(async () => {
        setLoading(true);
        const { data: grp, error } = await sb.from("reading_groups").select("*").order("created_at", { ascending: false });
        if (error) { toast(error.message); setLoading(false); return; }
        const { data: mems } = await sb.from("reading_group_members").select("group_id, user_id");
        const byG = {};
        for (const m of mems || []) {
          if (!byG[m.group_id]) byG[m.group_id] = [];
          byG[m.group_id].push(m.user_id);
        }
        const enriched = (grp || []).map((g) => {
          const mids = byG[g.id] || [];
          return {
            ...g,
            memberIds: mids,
            memberCount: mids.length,
            isMember: mids.includes(currentUserId),
            isCreator: g.created_by === currentUserId,
          };
        });
        setGroups(enriched);
        setLoading(false);
      }, [sb, toast, currentUserId]);

      useEffect(() => {
        if (!visible) return;
        loadGroups();
      }, [visible, loadGroups]);

      useEffect(() => {
        if (!visible) {
          setDetailGroup(null);
          setMergedBooks([]);
        }
      }, [visible]);

      const openDetail = async (g) => {
        setDetailGroup(g);
        setMergedBooks([]);
        if (!g.isMember) {
          setBooksLoading(false);
          return;
        }
        const ids = g.memberIds || [];
        if (!ids.length) return;
        setBooksLoading(true);
        const { data: bks, error } = await sb.from("books").select("*").in("user_id", ids).order("created_at", { ascending: false });
        if (error) { toast(error.message); setBooksLoading(false); return; }
        const { data: profs } = await sb.from("profiles").select("*").in("id", ids);
        const pmap = {};
        (profs || []).forEach((p) => { pmap[p.id] = p; });
        const merged = mergeGroupBooksByTitleAuthor(bks || [], (uid) => pmap[uid]);
        setMergedBooks(merged);
        setBooksLoading(false);
      };

      const joinGroup = async (g) => {
        const { error } = await sb.from("reading_group_members").insert({ group_id: g.id, user_id: currentUserId });
        if (error) { toast(error.message); return; }
        toast("Du bist der Gruppe beigetreten.");
        await loadGroups();
        const { data: mems } = await sb.from("reading_group_members").select("user_id").eq("group_id", g.id);
        const mids = (mems || []).map((m) => m.user_id);
        const updated = {
          ...g,
          memberIds: mids,
          memberCount: mids.length,
          isMember: true,
          isCreator: g.created_by === currentUserId,
        };
        setDetailGroup(updated);
        openDetail(updated);
      };

      const leaveGroup = async (g) => {
        if (g.created_by === currentUserId) { toast("Gruppe löschen statt verlassen (du bist Ersteller*in)."); return; }
        const { error } = await sb.from("reading_group_members").delete().eq("group_id", g.id).eq("user_id", currentUserId);
        if (error) { toast(error.message); return; }
        toast("Gruppe verlassen.");
        setDetailGroup(null);
        await loadGroups();
      };

      const deleteGroup = async (g) => {
        if (!confirm("Gruppe wirklich löschen? Alle Mitglieder verlieren die Ansicht.")) return;
        const { error } = await sb.from("reading_groups").delete().eq("id", g.id);
        if (error) { toast(error.message); return; }
        toast("Gruppe gelöscht.");
        setDetailGroup(null);
        await loadGroups();
      };

      const createGroup = async () => {
        const name = newName.trim();
        if (!name) { toast("Name fehlt."); return; }
        const { data, error } = await sb.from("reading_groups").insert({
          name,
          description: newDesc.trim(),
          created_by: currentUserId,
        }).select().single();
        if (error) { toast(error.message); return; }
        await sb.from("reading_group_members").insert({ group_id: data.id, user_id: currentUserId });
        toast("Gruppe erstellt.");
        setShowCreate(false);
        setNewName("");
        setNewDesc("");
        await loadGroups();
      };

      const inputStyle = {
        width:"100%", padding:"10px 14px", borderRadius:"12px",
        border:`1.5px solid ${P.cream}15`, background:P.surfaceDark,
        fontSize:"14px", color:P.cream, fontFamily:"'Crimson Pro',Georgia,serif", outline:"none", boxSizing:"border-box",
      };

      const closeDetail = () => {
        setDetailGroup(null);
        setMergedBooks([]);
      };

      return (
        <div className={"sm-page" + (detailGroup ? " sm-page-groups-detail" : "")}
          style={{ minHeight:"72vh", position:"relative" }}>
          {detailGroup ? (
            <>
              <button
                type="button"
                onClick={closeDetail}
                style={{
                  background:"none", border:"none", color:P.goldLight, cursor:"pointer",
                  fontFamily:"'Crimson Pro',Georgia,serif", fontSize:15, fontWeight:600, marginBottom:20,
                  display:"inline-flex", alignItems:"center", gap:8, padding:0,
                }}
              >
                <span style={{ fontSize:18, lineHeight:1 }} aria-hidden>←</span>
                Alle Gruppen
              </button>
              <h1 style={{ fontSize:"clamp(24px, 4vw, 34px)", fontWeight:700, color:P.cream, marginBottom:10, letterSpacing:"-0.5px" }}>
                {detailGroup.name}
              </h1>
              <p style={{ fontSize:14, color:P.textMuted, marginBottom:22, lineHeight:1.55, maxWidth:720 }}>
                {detailGroup.description || "Keine Beschreibung."}
              </p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:10, marginBottom:28, alignItems:"center" }}>
                {!detailGroup.isMember && (
                  <Btn accent={accent} onClick={()=>joinGroup(detailGroup)}><Icon name="plus" size={13} color={P.brickDark}/> Beitreten</Btn>
                )}
                {detailGroup.isMember && detailGroup.created_by !== currentUserId && (
                  <Btn variant="secondary" onClick={()=>leaveGroup(detailGroup)}>Gruppe verlassen</Btn>
                )}
                {detailGroup.isCreator && (
                  <Btn variant="secondary" onClick={()=>deleteGroup(detailGroup)}>Gruppe löschen</Btn>
                )}
              </div>
              {!detailGroup.isMember ? (
                <p style={{ color:P.textMuted, fontSize:15, lineHeight:1.65 }}>
                  Tritt der Gruppe bei, um alle gemeinsamen Bücher zu sehen (eigene Regale + Regale der anderen Mitglieder). Gleiche Bücher erscheinen einmal mit allen Besitzer-Symbolen.
                </p>
              ) : (
                <>
                  <div style={{ fontSize:11, fontWeight:700, color:P.textDim, textTransform:"uppercase", letterSpacing:0.8, marginBottom:14 }}>
                    Gemeinsame Bibliothek (gleicher Titel + Autor = eine Karte · Besitzer als Symbole)
                  </div>
                  {booksLoading ? (
                    <p style={{ color:P.textMuted, fontSize:15 }}>Lade Bücher…</p>
                  ) : (
                    <div className="sm-grid-groupbooks">
                      {mergedBooks.map((entry, i) => (
                        <GroupBookCard key={`${entry.title}-${i}`} entry={entry} accent={accent} cardBg={cardBg}/>
                      ))}
                      {mergedBooks.length === 0 && (
                        <p style={{ color:P.textDim, gridColumn:"1/-1", fontSize:15 }}>Noch keine Bücher in dieser Gruppe – fügt welche in euren Regalen hinzu.</p>
                      )}
                    </div>
                  )}
                </>
              )}
            </>
          ) : (
            <>
              <div className="sm-groups-header">
                <div>
                  <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, marginBottom:"4px" }}>Gruppen</h1>
                  <p style={{ fontSize:"14px", color:P.textMuted }}>Gemeinsame Bibliothek – alle Bücher der Mitglieder, Besitz auf einen Blick.</p>
                </div>
                <Btn accent={accent} onClick={()=>setShowCreate(true)}><Icon name="plus" size={14} color={P.brickDark}/> Neue Gruppe</Btn>
              </div>

              {loading ? (
                <p style={{ color:P.textMuted }}>Lade Gruppen…</p>
              ) : groups.length === 0 ? (
                <div style={{ textAlign:"center", padding:40, color:P.textDim }}>
                  <Ghost size={48} style={{ margin:"0 auto 16px" }}/>
                  Noch keine Gruppe – lege eine an oder tritt einer bei, sobald es welche gibt.
                </div>
              ) : (
                <div className="sm-grid sm-grid-2cols" style={{ gap:"14px" }}>
                  {groups.map((g) => (
                    <button
                      key={g.id}
                      type="button"
                      onClick={()=>openDetail(g)}
                      style={{
                        textAlign:"left", cursor:"pointer", borderRadius:18, border:`1px solid ${P.cream}10`,
                        background:P.surfaceDark, padding:22, fontFamily:"inherit", color:"inherit",
                      }}
                    >
                      <h3 style={{ fontSize:17, fontWeight:700, color:P.cream, marginBottom:6 }}>{g.name}</h3>
                      <p style={{ fontSize:12, color:P.textMuted, marginBottom:14, lineHeight:1.45, minHeight:36 }}>
                        {g.description || "—"}
                      </p>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                        <span style={{ fontSize:11, fontWeight:600, color:P.goldLight, background:`${P.goldLight}15`, padding:"4px 10px", borderRadius:8 }}>
                          {g.memberCount} Mitglied{g.memberCount === 1 ? "" : "er"}
                        </span>
                        {g.isMember ? (
                          <span style={{ fontSize:12, color:P.foliageLight, fontWeight:600 }}>Dabei</span>
                        ) : (
                          <span style={{ fontSize:12, color:P.textMuted }}>Öffnen / Beitreten</span>
                        )}
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </>
          )}

          {showCreate && (
            <Modal onClose={()=>setShowCreate(false)} title="Neue Gruppe">
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <div>
                  <label style={{ fontSize:12, color:P.textMuted, display:"block", marginBottom:6 }}>Name</label>
                  <input style={inputStyle} placeholder="z.B. Fantasy Fans" value={newName} onChange={e=>setNewName(e.target.value)}/>
                </div>
                <div>
                  <label style={{ fontSize:12, color:P.textMuted, display:"block", marginBottom:6 }}>Beschreibung</label>
                  <input style={inputStyle} placeholder="Worum geht es?" value={newDesc} onChange={e=>setNewDesc(e.target.value)}/>
                </div>
                <Btn accent={accent} onClick={createGroup}>Erstellen</Btn>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function MainApp({ sb }) {
      const isMobile = useMobileLayout();
      const [page, setPage] = useState("profile");
      const [themeKey, setThemeKey] = useState(() => localStorage.getItem("sm_theme") || "terracotta");
      useEffect(() => { localStorage.setItem("sm_theme", themeKey); }, [themeKey]);
      const theme = THEMES[themeKey];
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [books, setBooks] = useState([]);
      const [borrowedItems, setBorrowedItems] = useState([]);
      const [lendTargetBook, setLendTargetBook] = useState(null);
      const [friends, setFriends] = useState([]);
      const [discover, setDiscover] = useState([]);
      const [friendships, setFriendships] = useState([]);
      const [incoming, setIncoming] = useState([]);
      const [outgoing, setOutgoing] = useState([]);
      const [loadingApp, setLoadingApp] = useState(true);
      const [showAddBook, setShowAddBook] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [passwordRecovery, setPasswordRecovery] = useState(false);

      const toast = useCallback((msg) => {
        setToastMsg(msg); setTimeout(()=>setToastMsg(null), 3200);
      }, []);

      const loadAll = useCallback(async (sid) => {
        if (!sid) return;
        try {
          const { data: prof, error: pe } = await sb.from("profiles").select("*").eq("id", sid).maybeSingle();
          if (pe) { toast(pe.message); return; }
          if (!prof) {
            toast("Kein Profil gefunden. In Supabase SQL Editor supabase/schema.sql ausführen und neu registrieren.");
            return;
          }
          setProfile(prof);

          const { data: myBooks, error: be } = await sb.from("books").select("*").eq("user_id", sid).order("created_at", { ascending: false });
          if (be) toast(be.message);
          else {
            const { data: asLender } = await sb.from("book_loans").select("*").eq("lender_id", sid).eq("status", "active");
            const borrowerIds = [...new Set((asLender||[]).map((x)=>x.borrower_id))];
            const { data: bprofsL } = borrowerIds.length ? await sb.from("profiles").select("*").in("id", borrowerIds) : { data: [] };
            const bpL = Object.fromEntries((bprofsL||[]).map((p)=>[p.id, p]));
            const loanOutByBook = {};
            (asLender||[]).forEach((l) => { loanOutByBook[l.book_id] = { loanId: l.id, borrower: bpL[l.borrower_id] }; });
            setBooks((myBooks || []).map((b)=>({ ...b, loanOut: loanOutByBook[b.id] || null })));
          }

          const { data: asBorrower } = await sb.from("book_loans").select("*").eq("borrower_id", sid).eq("status", "active");
          const brBookIds = (asBorrower||[]).map((l)=>l.book_id);
          const lenderIdsBR = [...new Set((asBorrower||[]).map((l)=>l.lender_id))];
          const { data: brBooksRows } = brBookIds.length ? await sb.from("books").select("*").in("id", brBookIds) : { data: [] };
          const { data: lprofsBR } = lenderIdsBR.length ? await sb.from("profiles").select("*").in("id", lenderIdsBR) : { data: [] };
          const lm = Object.fromEntries((lprofsBR||[]).map((p)=>[p.id, p]));
          const brById = Object.fromEntries((brBooksRows||[]).map((b)=>[b.id, b]));
          setBorrowedItems((asBorrower||[]).map((l)=>({
            loanId: l.id,
            book: brById[l.book_id],
            lender: lm[l.lender_id],
          })).filter((x)=>x.book && x.lender));

          const { data: allFr, error: fe } = await sb.from("friendships").select("*").or(`requester_id.eq.${sid},addressee_id.eq.${sid}`);
          if (fe) toast(fe.message);
          const frRows = allFr || [];
          setFriendships(frRows);

          const acceptedIds = [];
          frRows.filter(f=>f.status==="accepted").forEach(f=>{
            if (f.requester_id===sid) acceptedIds.push(f.addressee_id);
            else acceptedIds.push(f.requester_id);
          });

          const inc = [];
          const out = [];
          frRows.forEach(f=>{
            if (f.status !== "pending") return;
            if (f.addressee_id===sid) inc.push({ ...f, requester: null });
            else if (f.requester_id===sid) out.push(f);
          });
          const needIds = inc.map(r=>r.requester_id).filter(Boolean);
          const { data: reqs } = needIds.length ? await sb.from("profiles").select("*").in("id", needIds) : { data: [] };
          const rqMap = {};
          (reqs||[]).forEach(r=>{ rqMap[r.id]=r; });
          setIncoming(inc.map(r=>({ ...r, requester: rqMap[r.requester_id] })).filter(r=>r.requester));
          setOutgoing(out);

          let friendProfiles = [];
          if (acceptedIds.length) {
            const { data: fps } = await sb.from("profiles").select("*").in("id", acceptedIds);
            friendProfiles = fps || [];
          }
          setFriends(friendProfiles);

          const { data: allP } = await sb.from("profiles").select("*").neq("id", sid);
          setDiscover(allP||[]);
        } finally {
          setLoadingApp(false);
        }
      }, [sb, toast]);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session: s } }) => {
          setSession(s); if (!s) setLoadingApp(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
          setSession(s);
          if (event === "PASSWORD_RECOVERY") setPasswordRecovery(true);
        });
        return () => subscription.unsubscribe();
      }, [sb]);

      useEffect(() => {
        if (passwordRecovery && session?.user?.id) {
          setLoadingApp(false);
          return;
        }
        if (session?.user?.id) {
          setLoadingApp(true);
          loadAll(session.user.id);
        } else {
          setProfile(null);
          setBooks([]);
          setBorrowedItems([]);
          setLendTargetBook(null);
          setFriends([]);
          setDiscover([]);
          setFriendships([]);
          setIncoming([]);
          setOutgoing([]);
          setLoadingApp(false);
          setPasswordRecovery(false);
        }
      }, [session?.user?.id, loadAll, passwordRecovery]);

      const userObj = profileToUser(profile);
      const friendCount = friends.length;

      const addBookDb = async (b) => {
        const uid = session.user.id;
        const row = {
          user_id: uid,
          title: b.title,
          author: b.author,
          year: b.year ?? 0,
          link: b.link || null,
          cover_url: b.cover_url || null,
          rating: null,
        };
        const { data, error } = await sb.from("books").insert(row).select().single();
        if (error) { toast(error.message); return; }
        setBooks(prev => [data, ...prev]);
        toast(`${data.title} hinzugefügt`);
      };

      const updateBookRating = async (bookId, rating) => {
        const uid = session.user.id;
        const { error } = await sb.from("books").update({ rating }).eq("id", bookId).eq("user_id", uid);
        if (error) toast(error.message);
        else setBooks(prev => prev.map(x => x.id === bookId ? { ...x, rating } : x));
      };

      const returnLoan = async (loanId) => {
        const { error } = await sb.from("book_loans").update({
          status: "returned",
          returned_at: new Date().toISOString(),
        }).eq("id", loanId);
        if (error) toast(error.message);
        else {
          toast("Leihe beendet.");
          loadAll(session.user.id);
        }
      };

      const removeBookDb = async (id) => {
        const { data: act } = await sb.from("book_loans").select("id").eq("book_id", id).eq("status", "active").maybeSingle();
        if (act) { toast("Buch ist verliehen – zuerst „Leihe beenden“."); return; }
        const { error } = await sb.from("books").delete().eq("id", id);
        if (error) toast(error.message);
        else { setBooks(prev=>prev.filter(x=>x.id!==id)); toast("Buch entfernt"); }
      };

      const signOut = async () => { await sb.auth.signOut(); setPage("profile"); };

      if (!session) {
        if (loadingApp) return <div style={{ padding:40, textAlign:"center", color:P.cream }}>Lade…</div>;
        return (
          <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, minHeight:"100vh" }}>
            <AuthScreen
              sb={sb}
              toast={toast}
              onAuthed={() => sb.auth.getSession().then(({ data: { session: s } }) => setSession(s))}
            />
            {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={false}/>}
          </div>
        );
      }

      if (passwordRecovery) {
        return (
          <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, minHeight:"100vh" }}>
            <PasswordRecoveryScreen
              sb={sb}
              toast={toast}
              onDone={() => {
                setPasswordRecovery(false);
                setLoadingApp(true);
                loadAll(session.user.id);
              }}
            />
            {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={false}/>}
          </div>
        );
      }

      if (loadingApp || !userObj) {
        return <div style={{ padding:40, textAlign:"center", color:P.cream }}>Lade Regal…</div>;
      }

      const navItems = [
        { id:"profile", label:"Regal",   icon:"book" },
        { id:"friends", label:"Freunde", icon:"users" },
        { id:"groups",  label:"Gruppen", icon:"grid" },
      ];

      return (
        <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, color:P.cream, minHeight:"100vh", position:"relative" }}>
          {!isMobile && (
            <>
          <div style={{ position:"fixed", top:60, left:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="left" height={200}/></div>
          <div style={{ position:"fixed", top:100, right:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="right" height={160}/></div>
          <div style={{ position:"fixed", bottom:0, left:10, zIndex:0, opacity:0.3, pointerEvents:"none" }}><Vine side="left" height={140}/></div>
            </>
          )}

          <nav style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            gap:isMobile ? 8 : undefined,
            padding:isMobile ? "8px max(14px, env(safe-area-inset-right)) 8px max(14px, env(safe-area-inset-left))"
              : "0 28px",
            paddingTop:isMobile ? "max(8px, env(safe-area-inset-top))" : undefined,
            minHeight:isMobile ? "48px" : "56px",
            boxSizing:"border-box",
            background:`${P.surface}E8`, backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
            borderBottom:`1px solid ${P.cream}10`,
            position:"sticky", top:0, zIndex:100,
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", flexShrink:0, minWidth:0 }}>
              <Ghost size={isMobile ? 22 : 26}/>
              <span style={{ fontSize:isMobile ? "16px" : "18px", fontWeight:800, color:P.cream, letterSpacing:"-0.3px" }}>Shelfmade</span>
            </div>
            {!isMobile && (
            <div style={{ display:"flex", gap:"2px", flex:1, justifyContent:"center", flexWrap:"wrap" }}>
              {navItems.map(n=>(
                <button key={n.id} type="button" onClick={()=>setPage(n.id)} style={{
                  padding:"7px 16px", borderRadius:"10px",
                  fontSize:"14px", fontWeight:page===n.id?700:400,
                  color:page===n.id?P.cream:P.textMuted,
                  background:page===n.id?`${P.cream}12`:"transparent",
                  border:"none", cursor:"pointer", transition:"all 0.2s",
                  fontFamily:"'Crimson Pro',Georgia,serif",
                  display:"flex", alignItems:"center", gap:"6px",
                }}>
                  <Icon name={n.icon} size={15} color={page===n.id?P.cream:P.textMuted}/> {n.label}
                </button>
              ))}
            </div>
            )}
            <div style={{ display:"flex", alignItems:"center", gap:isMobile ? 6 : 10, flexShrink:0 }}>
              <button type="button" onClick={signOut} style={{ background:"none", border:"none", color:P.textMuted, cursor:"pointer",
                fontSize:isMobile ? 11 : 12, fontFamily:"inherit", whiteSpace:"nowrap" }}>Abmelden</button>
              <Avatar initials={userObj.initials} size={isMobile ? 28 : 32} accent={theme.accent}/>
            </div>
          </nav>

          <div style={{ position:"relative", zIndex:1 }}>
            {page==="profile" && (
              <ProfilePage
                user={userObj}
                books={books}
                borrowedItems={borrowedItems}
                friendCount={friendCount}
                accent={theme.accent}
                cardBg={theme.card}
                onRemoveBook={removeBookDb}
                onRateBook={updateBookRating}
                onOpenAdd={()=>setShowAddBook(true)}
                themeKey={themeKey}
                onSetTheme={setThemeKey}
                onReturnLoan={returnLoan}
                onLendBook={(b)=>setLendTargetBook(b)}
              />
            )}
            {page==="friends" && (
              <FriendsPage accent={theme.accent} cardBg={theme.card} currentProfile={profile}
                friends={friends} discover={discover} friendships={friendships} incoming={incoming} outgoing={outgoing}
                onRefresh={()=>loadAll(session.user.id)} sb={sb} toast={toast}/>
            )}
            {page==="groups" && (
              <GroupsPage
                accent={theme.accent}
                cardBg={theme.card}
                sb={sb}
                toast={toast}
                currentUserId={session.user.id}
                visible={page==="groups"}
              />
            )}
          </div>

          {showAddBook && <AddBookModal onClose={()=>setShowAddBook(false)} onAddBook={addBookDb} accent={theme.accent}/>}
          {lendTargetBook && (
            <LendBookModal
              accent={theme.accent}
              bookTitle={lendTargetBook.title}
              friends={friends}
              onClose={()=>setLendTargetBook(null)}
              onPickFriend={async (friendId) => {
                const { error } = await sb.from("book_loans").insert({
                  book_id: lendTargetBook.id,
                  lender_id: session.user.id,
                  borrower_id: friendId,
                  status: "active",
                });
                if (error) toast(error.message);
                else {
                  toast("Verliehen – bei deinem Freund erscheint es als geliehen.");
                  setLendTargetBook(null);
                  loadAll(session.user.id);
                }
              }}
            />
          )}
          {toastMsg && <Toast message={toastMsg} accent={theme.accent} reserveBottom={isMobile}/>}

          {!isMobile && (
          <div style={{ position:"fixed", bottom:12, right:16, zIndex:50, opacity:0.6, pointerEvents:"none", animation:"ghostFloat 3s ease-in-out infinite" }}>
            <Ghost size={36}/>
          </div>
          )}

          {isMobile && (
            <nav aria-label="Hauptnavigation"
              style={{
                position:"fixed",
                bottom:0,
                left:0,
                right:0,
                zIndex:250,
                display:"flex",
                justifyContent:"space-around",
                alignItems:"stretch",
                gap:4,
                paddingBottom:"max(10px, env(safe-area-inset-bottom))",
                paddingTop:"8px",
                paddingLeft:"max(6px, env(safe-area-inset-left))",
                paddingRight:"max(6px, env(safe-area-inset-right))",
                background:`${P.surface}F2`,
                backdropFilter:"blur(18px)",
                WebkitBackdropFilter:"blur(18px)",
                borderTop:`1px solid ${P.cream}14`,
                boxShadow:"0 -6px 32px rgba(0,0,0,0.2)",
              }}>
              {navItems.map((n)=>(
                <button key={n.id} type="button" aria-current={page===n.id ? "page" : undefined}
                  onClick={()=>setPage(n.id)}
                  style={{
                    flex:1,
                    display:"flex",
                    flexDirection:"column",
                    alignItems:"center",
                    justifyContent:"center",
                    gap:3,
                    padding:"6px 2px",
                    borderRadius:"12px",
                    border:"none",
                    cursor:"pointer",
                    fontFamily:"'Crimson Pro',Georgia,serif",
                    background:page===n.id ? `${P.cream}14` : "transparent",
                    color:page===n.id ? P.cream : P.textMuted,
                    fontWeight:page===n.id ? 700 : 500,
                    fontSize:10,
                  }}>
                  <Icon name={n.icon} size={20} color={page===n.id ? P.cream : P.textMuted}/>
                  <span style={{ letterSpacing:n.label.length > 8 ? "-0.2px" : 0 }}>{n.label}</span>
                </button>
              ))}
            </nav>
          )}
        </div>
      );
    }

    function App() {
      const sb = useMemo(() => createSb(), []);
      if (!sb) return (
        <div style={{ background:P.bg, minHeight:"100vh" }}>
          <ConfigScreen/>
          <CookieConsentBanner/>
        </div>
      );
      return (
        <>
          <MainApp sb={sb}/>
          <CookieConsentBanner/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
