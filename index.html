<html lang="de">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #6B7D6B;
      --surface: #A0523C;
      --surface-light: #B8654E;
      --surface-dark: #8B4533;
      --brick: #6B3A2E;
      --brick-dark: #4A2A1F;
      --cream: #F2E6D9;
      --cream-dark: #EDD8C8;
      --ghost: #F5E8DC;
      --ghost-pink: #F0D5C5;
      --gold: #C4A24E;
      --gold-light: #D4B05E;
      --sage: #8A9A7E;
      --sage-dark: #6B7D6B;
      --foliage: #3E5C3E;
      --foliage-light: #5A7A5A;
      --text: #F2E6D9;
      --text-muted: #D4B8A0;
      --text-dim: #A08070;
      --overlay: rgba(74,42,31,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
    }
    ::placeholder { color: var(--text-dim); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

    @keyframes ghostFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes scanMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }

    html { -webkit-text-size-adjust: 100%; }
    #root { min-height: 100dvh; }

    .sm-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* Gruppen-Detail kann breiter sein – max-width wird per Klasse ergänzt */
    .sm-page.sm-page-groups-detail { max-width: 960px; }

    .sm-profile-head {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 36px;
    }

    .sm-stack-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sm-grid {
      display: grid;
      gap: 14px;
    }

    .sm-grid-3cols { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .sm-grid-2cols { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }

    .sm-grid-groupbooks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .sm-groups-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 640px) {
      .sm-page {
        padding: 16px 14px calc(88px + env(safe-area-inset-bottom, 0px)) 14px;
      }

      .sm-profile-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 24px;
      }

      .sm-grid-3cols {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .sm-grid-2cols {
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
      }

      .sm-grid-groupbooks {
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
      }

      /* Modals wie Bottom-Sheets – besser thumb-erreichbar */
      .sm-modal-overlay {
        align-items: flex-end !important;
        justify-content: center !important;
        padding: 0 !important;
      }

      .sm-modal-panel {
        max-height: min(92dvh, 92vh) !important;
        border-radius: 22px 22px 0 0 !important;
        max-width: 100% !important;
        width: 100% !important;
        padding-bottom: max(28px, calc(24px + env(safe-area-inset-bottom))) !important;
      }

      .sm-profile-head h1 {
        font-size: clamp(22px, 5.8vw, 28px);
        word-break: break-word;
      }

      .sm-request-row {
        flex-wrap: wrap !important;
        gap: 8px !important;
      }

      .sm-invite-controls {
        flex-direction: column !important;
        align-items: stretch !important;
      }

      .sm-search-hit {
        flex-direction: column !important;
        align-items: stretch !important;
      }

      .sm-search-hit .sm-hit-add-btn {
        width: 100% !important;
        min-height: 48px !important;
        justify-content: center !important;
      }

      .sm-addbook-search-row {
        flex-direction: column !important;
        align-items: stretch !important;
      }

      .sm-addbook-search-row > button:last-child {
        width: 100%;
        min-height: 48px;
      }

      .sm-modal-close {
        min-width: 44px;
        min-height: 44px;
        display: flex !important;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
      }

      .sm-reco-genre-chip {
        min-height: 44px;
        align-items: center;
      }

      .sm-reco-carousel-wrap .sm-reco-refresh-btn {

      }
    }

    @media (max-width: 380px) {
      .sm-grid-3cols {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>

<body>
  <div id="root"><div id="sm-static-boot" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Crimson Pro',Georgia,serif;color:#F2E6D9;background:#6B7D6B;text-align:center;box-sizing:border-box">Shelfmade lädt …</div></div>

  <script type="text/babel">
    /**

    /** @jsxRuntime classic */
    /** @jsxFrag React.Fragment */

    const { useState, useEffect, useCallback, useMemo, useRef, Component } = React;

    /* ─── Supabase Projekt-Einstellungen (Project Settings → API) ─── */
    const SUPABASE_URL = "https://xzwbyjpmijhusrnskmmv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6d2J5anBtaWpodXNybnNrbW12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA0NTksImV4cCI6MjA5Mzk3NjQ1OX0.Eylt9aXTqCUWsLy6YfI5PXzFGfc1gY4cjf82yJR3IXw";

    /** Nimmt nur den öffentlichen anon-Key — service_role würde Clients unsicher machen */
    function readJwtRole(jwt) {
      if (!jwt || typeof jwt !== "string") return null;
      const parts = jwt.split(".");
      if (parts.length < 2) return null;
      try {
        const b64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
        const pad = b64.length % 4 ? "=".repeat(4 - (b64.length % 4)) : "";
        const json = atob(b64 + pad);
        const payload = JSON.parse(json);
        return payload.role || null;
      } catch {
        return null;
      }
    }

    function validateSupabaseProjectConfig() {
      const issues = [];
      const raw = (SUPABASE_URL || "").trim().replace(/\/+$/, "");
      if (!raw.startsWith("https://")) {
        issues.push("SUPABASE_URL muss mit https:// beginnen (Vercel und Supabase Auth).");
      } else {
        try {
          const host = new URL(raw).hostname;
          if (!/\.supabase\.co$/i.test(host)) {
            issues.push("SUPABASE_URL sollte auf *.supabase.co zeigen (Project Settings → API), es sei denn du nutzt eine ausdrücklich erlaubte Proxy-URL.");
          }
        } catch {
          issues.push("SUPABASE_URL ist keine gültige https-URL.");
        }
      }
      if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.length < 20) {
        issues.push("SUPABASE_ANON_KEY fehlt oder ist zu kurz.");
      } else {
        const role = readJwtRole(SUPABASE_ANON_KEY);
        if (role === "service_role") {
          issues.push('Im Key steht die Rolle „service_role“. Verwende nur den „anon“-Key (Publishable) aus dem Supabase-Dashboard — niemals den Service-Role-Key in der Web-App.');
        } else if (role && role !== "anon") {
          issues.push('Unerwartete JWT-Rolle („' + role + '„). Für Browser-Clients ist normalerweise „anon“ erforderlich.');
        }
      }
      return issues;
    }

    const P = {
      bg: "#6B7D6B", surface: "#A0523C", surfaceLight: "#B8654E", surfaceDark: "#8B4533",
      brick: "#6B3A2E", brickDark: "#4A2A1F",
      cream: "#F2E6D9", creamDark: "#EDD8C8",
      ghost: "#F5E8DC", ghostPink: "#F0D5C5",
      gold: "#C4A24E", goldLight: "#D4B05E",
      sage: "#8A9A7E", sageDark: "#6B7D6B",
      foliage: "#3E5C3E", foliageLight: "#5A7A5A",
      text: "#F2E6D9", textMuted: "#D4B8A0", textDim: "#A08070",
      overlay: "rgba(74,42,31,0.7)",
    };

    const THEMES = {
      terracotta: { name: "Terracotta", accent: "#B8654E", card: "#A0523C" },
      sage:       { name: "Salbei",     accent: "#8A9A7E", card: "#6B7D6B" },
      gold:       { name: "Gold",       accent: "#D4B05E", card: "#A0523C" },
      plum:       { name: "Pflaume",    accent: "#8B6B7A", card: "#7A5A6A" },
      midnight:   { name: "Nacht",      accent: "#5A6B8A", card: "#4A5A7A" },
      forest:     { name: "Wald",       accent: "#5A7A5A", card: "#4A6B4A" },
    };

    /** ≤640px: Tab-Leiste unten, kompakte Layouts */
    function useMobileLayout() {
      const mq = "(max-width: 640px)";
      function readMatch() {
        if (typeof window === "undefined") return false;
        try {
          const m = window.matchMedia(mq);
          return !!(m && m.matches);
        } catch (_) {
          return window.innerWidth <= 640;
        }
      }
      const [isMobile, setIsMobile] = useState(readMatch);
      useEffect(() => {
        try {
          const m = window.matchMedia(mq);
          if (!m?.addEventListener) return undefined;
          const handler = () => setIsMobile(!!m.matches);
          m.addEventListener("change", handler);
          setIsMobile(!!m.matches);
          return () => m.removeEventListener("change", handler);
        } catch (_) {
          const onResize = () => setIsMobile(window.innerWidth <= 640);
          onResize();
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }
      }, []);
      return isMobile;
    }

    /** Cover-URL aus Open-Library-Suchtreffer (covers.openlibrary.org) */
    function openLibraryCoverUrl(doc) {
      if (doc.cover_i)
        return `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
      let raw = [];
      if (Array.isArray(doc.isbn) && doc.isbn.length) raw = doc.isbn;
      else {
        if (doc.isbn_13) raw.push(doc.isbn_13);
        if (doc.isbn_10) raw.push(doc.isbn_10);
      }
      if (raw.length) {
        const clean = (s) => String(s).replace(/[^0-9Xx]/g, "");
        const ten = raw.map(clean).find((x) => x.length === 10);
        const thirteen = raw.map(clean).find((x) => x.length === 13);
        const isbn = thirteen || ten;
        if (isbn) return `https://covers.openlibrary.org/isbn/${isbn}-M.jpg`;
      }
      return null;
    }

    /** Kanonische Werk-URL-Segmentform z. B. /works/OL27448W (sprachübergreifend dasselbe Werk) */
    function normalizeOpenLibraryWorkKey(val) {
      if (val == null) return null;
      const s = String(val).trim();
      if (!s) return null;
      const fromPath = s.match(/\/works\/([^/\s#?]+)/i);
      if (fromPath) return `/works/${fromPath[1]}`;
      if (/^OL[\dA-Za-z]+W$/i.test(s)) return `/works/${s}`;
      return null;
    }

    /** Aus Open-Library-Suchschnipsel (Solr) — oft schon /works/… */
    function extractOpenLibraryWorkKeyFromSearchDoc(doc) {
      if (!doc || typeof doc !== "object") return null;
      const tryKey = (raw) => {
        if (typeof raw !== "string") return null;
        const t = raw.trim();
        if (t.startsWith("/works/")) return normalizeOpenLibraryWorkKey(t);
        return null;
      };
      let w = tryKey(doc.key);
      if (w) return w;
      if (Array.isArray(doc.key)) {
        for (const x of doc.key) {
          w = tryKey(x);
          if (w) return w;
        }
      }
      return null;
    }

    async function fetchOpenLibraryWorkKeyForEdition(editionId, signal) {
      const id = String(editionId || "").replace(/^\/books\//i, "").trim();
      if (!/^OL[\dA-Za-z]+M$/i.test(id)) return null;
      try {
        const url = `https://openlibrary.org/books/${encodeURIComponent(id)}.json`;
        const res = await fetch(url, signal ? { signal } : undefined);
        if (!res.ok) return null;
        const j = await res.json();
        const works = Array.isArray(j.works) ? j.works : [];
        const k = works[0] && typeof works[0].key === "string" ? works[0].key.trim() : null;
        if (k && k.includes("/works/")) return normalizeOpenLibraryWorkKey(k);
      } catch (_) { /* Netzwerk / CORS */ }
      return null;
    }

    /** Nachlädt Werk-ID für Auflagen-Links (/books/OL…M) — wenige parallel, damit Mobilfunk nicht leidet */
    async function attachOpenLibraryWorkKeysToRows(rows, signal, maxResolve = 20) {
      if (!rows || !rows.length) return rows;
      const indices = [];
      for (let i = 0; i < rows.length && indices.length < maxResolve; i++) {
        const r = rows[i];
        if (r.work_key) continue;
        const href = r.link && String(r.link);
        const m = href && href.match(/\/books\/(OL[\dA-Za-z]+M)(?:\/|$)/i);
        if (m) indices.push({ i, id: m[1] });
      }
      const chunk = 5;
      for (let off = 0; off < indices.length; off += chunk) {
        const part = indices.slice(off, off + chunk);
        await Promise.all(
          part.map(({ i, id }) =>
            fetchOpenLibraryWorkKeyForEdition(id, signal).then((wk) => {
              if (wk && rows[i]) rows[i] = { ...rows[i], work_key: wk };
            })
          )
        );
      }
      return rows;
    }

    /** Treffer der Kurzsuche passt zum Regal-Eintrag (für Werk-ID-Nachladen bei alten Büchern) */
    function openLibraryHitMatchesShelfBook(shelfBook, hit) {
      if (!shelfBook || !hit) return false;
      if (!authorsLikelySame(shelfBook.author, hit.author)) return false;
      if (bookDiscoveryKey(shelfBook) === bookDiscoveryKey(hit)) return true;
      const jac = jaccardTokenSets(
        titleWordSetForDedup(shelfBook.title),
        titleWordSetForDedup(hit.title)
      );
      return jac >= 0.2;
    }

    /**
     * Fehlende Open-Library-Werk-IDs für bestehende Regal-Bücher nachziehen (Translations & Vorschläge).
     * Holt pro Buch eine Kurzsuche bei Open Library und aktualisiert die Zeile — nacheinander mit kurzer Pause (Mobil/Mobile net).
     */
    async function backfillMissingOpenLibraryWorkKeysForShelf(books, sb, userId, { maxBooks = 40, toast, onReloadShelf } = {}) {
      if (!sb || !userId || !books || !books.length) return 0;
      const missing = books.filter((b) => !normalizeOpenLibraryWorkKey(b.open_library_work_key));
      const queue = missing.slice(0, Math.max(0, Math.min(maxBooks, 80)));
      if (!queue.length) {
        if (toast) toast("Alle sichtbaren Bücher haben schon eine Open-Library-Werk-ID.");
        return 0;
      }
      let updated = 0;
      for (const b of queue) {
        const au = primaryAuthorFromBookAuthor(b.author);
        const q = `${au} ${String(b.title || "").trim()}`.trim().slice(0, 220);
        if (q.length < 3) continue;
        try {
          const hits = await searchOpenLibrary(q, 5, undefined, {
            resolveEditionWorkKeys: true,
            maxEditionLookups: 3,
          });
          const match = hits.find((h) => openLibraryHitMatchesShelfBook(b, h));
          const wk = match && normalizeOpenLibraryWorkKey(match.work_key);
          if (!wk) {
            await new Promise((r) => setTimeout(r, 80));
            continue;
          }
          const { error } = await sb.from("books").update({ open_library_work_key: wk }).eq("id", b.id).eq("user_id", userId);
          if (!error) updated++;
          else if (toast && /column|schema|open_library_work_key/i.test(error.message || "")) {
            toast("Spalte open_library_work_key fehlt — bitte migration_ol_work_key.sql in Supabase ausführen.");
            break;
          } else if (toast) toast(error.message);
        } catch (_) { /* Netzwerk */ }
        await new Promise((r) => setTimeout(r, 100));
      }
      if (updated > 0 && typeof onReloadShelf === "function") onReloadShelf();
      if (toast) {
        if (updated > 0) toast(`${updated} Werk-ID${updated === 1 ? "" : "s"} von Open Library ergänzt.`);
        else toast("Keine zuverlässigen Werk-IDs gefunden — später erneut versuchen oder Titel prüfen.");
      }
      return updated;
    }

    /** Einzelanfrage Open Library (limit anpassbar für Live-Vorschläge) — optional Werk-ID für Auflagen nachladen */
    async function searchOpenLibrary(query, limit = 18, signal, attachOpts) {
      const opts = attachOpts || {};
      const resolveEditions = opts.resolveEditionWorkKeys === true;
      const maxEditionLookups =
        opts.maxEditionLookups != null ? opts.maxEditionLookups : Math.min(limit, 16);

      const q = query.trim();
      if (!q) return [];
      const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=${limit}`;
      const res = await fetch(url, signal ? { signal } : undefined);
      if (!res.ok) throw new Error("Open Library antwortet nicht – später bitte erneut versuchen.");
      const json = await res.json();
      const out = [];
      for (const doc of json.docs || []) {
        const titleRaw = doc.title;
        const title = Array.isArray(titleRaw) ? titleRaw[0] : titleRaw;
        if (!title || typeof title !== "string") continue;
        const author = (doc.author_name && doc.author_name[0]) || "Unbekannt";
        let year = doc.first_publish_year;
        if (year == null && Array.isArray(doc.publish_year) && doc.publish_year.length)
          year = doc.publish_year[0];
        if (year == null || typeof year !== "number") year = 0;
        const link = doc.key ? `https://openlibrary.org${doc.key}` : null;
        const cover_url = openLibraryCoverUrl(doc);
        const work_key = extractOpenLibraryWorkKeyFromSearchDoc(doc) || null;
        out.push({ title, author, year, link, cover_url, work_key });
      }
      if (resolveEditions && out.length) await attachOpenLibraryWorkKeysToRows(out, signal, maxEditionLookups);
      return out;
    }

    /** Mehrere Suchvarianten (Tippfehler, Teilbegriffe, Umlaute) und Ergebnisse zusammenführen */
    function buildSearchVariants(raw) {
      const q = raw.trim();
      if (!q) return [];
      const variants = new Set([q]);
      const parts = q.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) {
        variants.add(parts[0]);
        variants.add(parts[parts.length - 1]);
        variants.add(parts.slice(0, 2).join(" "));
      }
      const first = parts[0] || q;
      if (first.length >= 4) variants.add(first.slice(0, -1));
      if (first.length >= 5) variants.add(first.slice(0, -2));
      if (first.length >= 6) variants.add(first.slice(0, -3));
      const relaxed = q
        .replace(/ä/gi, "a").replace(/ö/gi, "o").replace(/ü/gi, "u")
        .replace(/ß/g, "ss");
      if (relaxed !== q) variants.add(relaxed);
      return [...variants].filter(v => v.length >= 1).slice(0, 10);
    }

    function mergeUniqueBookLists(lists) {
      const map = new Map();
      for (const list of lists) {
        for (const b of list) {
          const k = `${b.title.toLowerCase()}|${b.author.toLowerCase()}`;
          const ex = map.get(k);
          if (!ex) {
            map.set(k, { ...b });
          } else {
            const nw = normalizeOpenLibraryWorkKey(b.work_key);
            const ow = normalizeOpenLibraryWorkKey(ex.work_key);
            const merged = { ...ex, ...b };
            merged.cover_url = b.cover_url || ex.cover_url;
            merged.link = b.link || ex.link;
            merged.work_key = nw || ow || null;
            map.set(k, merged);
          }
        }
      }
      return [...map.values()];
    }

    /** „Suchen“-Button: mehrere Varianten parallel (Toleranz bei Tippfehlern) */
    async function searchOpenLibrarySmart(query) {
      const base = query.trim();
      if (!base) return [];
      const variants = buildSearchVariants(base);
      const perVariantLimit = 12;
      const results = await Promise.all(
        variants.map(v => searchOpenLibrary(v, perVariantLimit).catch(() => []))
      );
      return mergeUniqueBookLists(results);
    }

    function bookDiscoveryKey(b) {
      return `${String(b.title || "").trim().toLowerCase()}|${String(b.author || "").trim().toLowerCase()}`;
    }

    const SHELF_RECO_RULES = [
      { id: "author_keyword", label: "Autor·in + Titelstichwort", hint: "Autor·innen aus deinem Regal plus Titelstichwort — mit Genre-Filter kombinierbar." },
      { id: "author_only", label: "Nur Autor·in (breiter)", hint: "Alles von denselben Autor·innen; Genre zieht die Liste stärker in eine Richtung." },
      { id: "smart_wide", label: "Variantensuche", hint: "Gleiche Logik wie oben, aber toleranter bei Schreibweisen." },

    /** Erster Hauptautor (vor Komma/&), für Open-Library-Anfragen */
    function primaryAuthorFromBookAuthor(authorField) {
      const s = String(authorField || "").trim();
      if (!s || /^unbekannt$/i.test(s)) return "";
      return s.split(/[,;&]/)[0].trim().replace(/\s+(und|and)\s+.+$/i, "").trim();
    }

    /** Titel ohne Untertitel/Umlaute fürs Abgleichen (gleiches Buch, andere Sprache) */
    function normalizeTitleForShelfMatch(rawTitle) {
      let s = String(rawTitle || "").toLowerCase();
      s = s.split(/[:(\[—–-]/)[0];
      s = s
        .replace(/ä/g, "a").replace(/ö/g, "o").replace(/ü/g, "u").replace(/ß/g, "ss")
        .replace(/[„"'«»`´]/g, " ")
        .replace(/[.,;:!?¿¡()[\]{}]/g, " ");
      s = s.replace(/[^a-z0-9\s]/gi, " ");
      s = s.replace(/\s+/g, " ").trim();
      return s;
    }

    function canonAuthorStr(authorField) {
      let s = primaryAuthorFromBookAuthor(authorField).toLowerCase().trim();
      if (!s) return "";
      s = s.replace(/ä/g, "a").replace(/ö/g, "o").replace(/ü/g, "u").replace(/ß/g, "ss");
      s = s.replace(/\./g, " ");
      s = s.replace(/[^a-z0-9\s-]/gi, " ");
      s = s.replace(/\s+/g, " ").trim();
      return s;
    }

    const SHELF_TITLE_DEDUP_STOP = new Set([
      "the","a","an","and","or","of","on","in","to","for","with","from","into","about","von","zu","auf","bei","vor","ein","eine","einer","eines","einem","einen","der","die","das","dem","den","des","mit","nach","wie","über","fur","fur","without","edited","translator","adaptation","book","roman","novel","volume","vol","edition","edition","study","guide","guides","graphic","novels","new","edition","edition","introduction","critical","essay","novelization","novelisation","roman","serie","series","teil","band",
    ]);

    /** Jaccard auf Titelwort-Mengen (sprachübergreifend brauchbar wenn Autor gleich bleibt) */
    function titleWordSetForDedup(rawTitle) {
      const norm = normalizeTitleForShelfMatch(rawTitle);
      const words = norm.split(/\s/).filter((w) => {
        if (w.length < 3) return false;
        if (/^\d+$/.test(w)) return false;
        if (SHELF_TITLE_DEDUP_STOP.has(w)) return false;
        return true;
      });
      return new Set(words);
    }

    function jaccardTokenSets(aSet, bSet) {
      if (!aSet.size && !bSet.size) return 1;
      let inter = 0;
      for (const x of aSet) {
        if (bSet.has(x)) inter++;
      }
      const u = aSet.size + bSet.size - inter;
      return u <= 0 ? 0 : inter / u;
    }

    /** Gleiche*r Autor·in trotz abweichender Schreibweise (Transliteration/Titel-Reihenfolge) */
    function authorsLikelySame(authorFieldA, authorFieldB) {
      const pa = canonAuthorStr(authorFieldA);
      const pb = canonAuthorStr(authorFieldB);
      if (!pa || !pb) return false;
      if (pa === pb) return true;
      if (pa.length >= 7 && pb.length >= 7 && (pa.includes(pb) || pb.includes(pa))) return true;
      const wa = [...new Set(pa.split(" ").filter((w) => w.length >= 3))];
      const wb = [...new Set(pb.split(" ").filter((w) => w.length >= 3))];
      if (!wa.length || !wb.length) return pa === pb;
      /* gleiche Tokens (z. B. „king stephen“ vs „stephen king“) */
      const sortedEq = [...wa].sort().join(",") === [...wb].sort().join(",");
      if (sortedEq) return true;
      for (const x of wa) {
        for (const y of wb) {
          if (x === y) return true;
          if (x.length >= 5 && y.length >= 5 && (x.includes(y) || y.includes(x))) return true;
        }
      }
      return false;
    }

    function buildShelfOwnedTitleIndex(ownedBooks) {
      return (ownedBooks || []).map((b) => ({
        authorField: b.author,
        collapsedTitle: normalizeTitleForShelfMatch(b.title),
        tokens: titleWordSetForDedup(b.title),
      }));
    }

    function buildShelfOwnedWorkKeySet(ownedBooks) {
      const set = new Set();
      for (const b of ownedBooks || []) {
        const w = normalizeOpenLibraryWorkKey(b.open_library_work_key);
        if (w) set.add(w);
      }
      return set;
    }

    /** Schon besessen? Inkl. Werk-ID von Open Library sowie Titel-/Autor·innen-Heuristiken. */
    function recoCandidateAlreadyOnShelf(candidate, shelfIndex, ownedStrictKeys, ownedWorkKeys) {
      const k = bookDiscoveryKey(candidate);
      if (ownedStrictKeys.has(k)) return true;
      const cw = normalizeOpenLibraryWorkKey(candidate.work_key);
      if (cw && ownedWorkKeys && ownedWorkKeys.has(cw)) return true;
      const candCol = normalizeTitleForShelfMatch(candidate.title);
      const candTok = titleWordSetForDedup(candidate.title);
      const pa = canonAuthorStr(candidate.author);
      if (!pa || !primaryAuthorFromBookAuthor(candidate.author)) return false;

      for (const row of shelfIndex) {
        if (!authorsLikelySame(row.authorField, candidate.author)) continue;

        const ocol = row.collapsedTitle;
        if (ocol && candCol && ocol === candCol) return true;

        /* Lange Titel, ein String enthält den anderen (Ausgaben/Zusatz) */
        const minChunk = Math.min(ocol.length, candCol.length);
        if (
          minChunk >= 14 &&
          (ocol.includes(candCol) || candCol.includes(ocol)) &&
          candCol.length >= 12
        ) {
          return true;
        }

        /* Wortüberlappung (gleiche oder sehr ähnliche Titel ohne Übersetzung) */
        const jac = jaccardTokenSets(row.tokens, candTok);
        if (jac >= 0.42) return true;

        let longHits = 0;
        let medHits = 0;
        for (const w of row.tokens) {
          if (!candTok.has(w)) continue;
          if (w.length >= 7) longHits++;
          else if (w.length >= 5) medHits++;
        }

        /* Knappe Sachbuch-/One-Concept-Titel: gleiches markantes Signalwort oder starke Überlappung */
        const smallBoth = Math.max(row.tokens.size, candTok.size) <= 4;
        if (smallBoth && jac >= 0.29) return true;

        /* Mehrteilige Sachbuch-/Business-Titel: gleicher langer Schlüsseltausammenhang */
        if (longHits >= 2 || (longHits >= 1 && jac >= 0.28 && Math.min(row.tokens.size, candTok.size) >= 4)) return true;

        if (jac >= 0.38 && Math.min(row.tokens.size, candTok.size) >= 5 && (medHits >= 3 || medHits + longHits >= 4))
          return true;
      }

      /* Übersetzung ohne gemeinsame Titelwortform: keine zuverlässige Erkennung ohne ISBN/Werk-ID — Bewusst keine Löschung */

      return false;
    }

    /** Ein markantes Wort aus dem Titel (ohne sehr kurze Füllwörter) */
    function titleDiscoveryKeyword(rawTitle) {
      const stop = new Set(["der","die","das","den","dem","ein","eine","einer","the","a","an","von","und","zu","im","in","am","auf","bei","vol","band","buch"]);
      const head = String(rawTitle || "").split(/[:\[(]/)[0];
      const parts = head.trim().split(/\s+/).filter(Boolean);
      for (const raw of parts) {
        const w = raw.replace(/^[„"'«]+|[„"'».,!?;:]+$/g, "");
        const letters = w.replace(/[^a-zA-ZÄÖÜäöüß0-9'-]/g, "");
        const core = w.toLowerCase();
        if (w.length >= 4 && letters.length >= 3 && !stop.has(core)) return w;
      }
      return "";
    }

    /** Direkte Genre-/Subject-Suche bei Open Library (zusätzliche Treffer zum Autor·innen-Teil) */
    async function fetchOpenLibraryGenreBranches(subjectLabel, limitEach = 14) {
      const raw = String(subjectLabel || "").trim();
      if (!raw) return [];
      const safe = raw.replace(/"/g, "");
      const [a, b] = await Promise.all([
        searchOpenLibrary(`subject:"${safe}"`, limitEach).catch(() => []),
        searchOpenLibrary(safe, Math.max(10, limitEach - 4)).catch(() => []),
      ]);
      return [a, b];
    }

    /** Für Ranking: Autor·innen-Stimmen + Titelstichwörter aus dem eigenen Regal */
    function shelfRecoAffinityContext(ownedBooks) {
      const shelfAuthorLc = new Set();
      const ownedTitleKeywordsLc = new Set();
      for (const b of ownedBooks || []) {
        const pa = primaryAuthorFromBookAuthor(b.author);
        if (pa) shelfAuthorLc.add(pa.toLowerCase().trim());
        const k = titleDiscoveryKeyword(b.title);
        if (k.length >= 4) ownedTitleKeywordsLc.add(k.toLowerCase());
      }
      return { shelfAuthorLc, ownedTitleKeywordsLc };
    }

    function rankRecoByShelfAffinity(rows, shelfAuthorLc, ownedTitleKeywordsLc) {
      const authorsArr = [...shelfAuthorLc];
      const scoreOf = (bk) => {
        let s = 0;
        const pa = primaryAuthorFromBookAuthor(bk.author).toLowerCase().trim();
        if (!pa) return -1e6;
        if (shelfAuthorLc.has(pa)) s += 220;
        else {
          for (const sa of authorsArr) {
            if (sa.length < 3) continue;
            if (pa === sa || pa.includes(sa) || sa.includes(pa)) {
              s += 120;
              break;
            }
          }
        }
        const titleLow = String(bk.title || "").toLowerCase();
        for (const kw of ownedTitleKeywordsLc) {
          if (kw.length >= 4 && titleLow.includes(kw)) {
            s += 28;
            break;
          }
        }
        const y = typeof bk.year === "number" ? bk.year : 0;
        if (y > 0) s += Math.min(24, Math.floor(y / 85));
        return s;
      };
      return [...rows].sort((a, b) => scoreOf(b) - scoreOf(a));
    }

    /**
     * Themen / Genres aus deinen Büchern schätzen (Top-Treffer zu Autor·in+Titel bei Open Library).
     */
    async function inferShelfSubjectsFromOpenLibrary(ownedBooks, { maxLookups = 12, signal } = {}) {
      const pool = (ownedBooks || []).filter((b) => primaryAuthorFromBookAuthor(b.author)).slice(0, 32);
      const counts = new Map();
      const seenQuery = new Set();
      let lookups = 0;
      for (const b of pool) {
        if (signal && signal.aborted) break;
        if (lookups >= maxLookups) break;
        const au = primaryAuthorFromBookAuthor(b.author);
        const shortTitle = String(b.title || "").split(/[:\[(]/)[0].trim().slice(0, 58);
        const q = `${au} ${shortTitle}`.trim();
        const qk = q.toLowerCase();
        if (seenQuery.has(qk)) continue;
        seenQuery.add(qk);
        lookups++;
        try {
          const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=2`;
          const res = await fetch(url, signal ? { signal } : undefined);
          if (!res.ok) continue;
          const json = await res.json();
          for (const doc of json.docs || []) {
            let subs = doc.subject || [];
            if (!Array.isArray(subs)) subs = [subs];
            for (const raw of subs) {
              const subj = String(raw || "").trim();
              if (subj.length < 4 || subj.length > 72) continue;
              const low = subj.toLowerCase();
              if (
                /(^|\b)(bibliography|catalog|large type|textbooks|study|problems|exercises|specimens)\b/i.test(subj) ||
                low.includes("accessible book")
              ) continue;
              counts.set(subj, (counts.get(subj) || 0) + 1);
            }
          }
        } catch { /* offline / CORS */ }
      }
      const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]).map(([s]) => s);
      const majorLc = new Set(
        RECO_MAJOR_GENRES.map((g) => g.subject.toLowerCase()).filter(Boolean)
      );
      const out = [];
      const seenLower = new Set();
      for (const s of sorted) {
        const l = s.toLowerCase();
        if (seenLower.has(l)) continue;
        seenLower.add(l);
        if (majorLc.has(l)) continue;
        out.push(s);
        if (out.length >= 8) break;
      }
      return out;
    }

    /**
     * Stöber-Tipps: Autor·innen / Titel aus dem Regal, optional Genre-Filter,
     * Zusatz-Treffer über Open-Library-Subjects, dann nach Ähnlichkeit sortiert.
     */
    /** Reihenfenster ohne Wiederholung solange möglich — für „Neu laden“ andere Autor·innen */
    function rotateTakeFromAuthors(authorBooks, startAbs, take) {
      const n = authorBooks.length;
      if (!n || take <= 0) return [];
      const t = Math.min(take, n);
      const s = ((Math.floor(startAbs) % n) + n) % n;
      const out = [];
      for (let i = 0; i < t; i++) out.push(authorBooks[(s + i) % n]);
      return out;
    }

    async function fetchShelfRecommendations(ownedBooks, opts = {}) {
      const limit = opts.limit ?? 22;
      const maxAuthors = opts.maxAuthors ?? 6;
      const refreshVariant =
        opts.refreshVariant != null && opts.refreshVariant !== ""
          ? Number(opts.refreshVariant)
          : 0;
      const rv = Number.isFinite(refreshVariant) ? refreshVariant : 0;
      const rule = opts.rule || "author_keyword";
      const subjectRaw = String(opts.subjectExtra || "").trim();
      const minYear =
        opts.minYear != null && opts.minYear !== ""
          ? parseInt(String(opts.minYear), 10)
          : 0;
      const minY = Number.isFinite(minYear) && minYear > 1000 ? minYear : 0;

      const withSubject = (q) => {
        const t = String(q || "").trim();
        if (!subjectRaw) return t;
        return `${t} ${subjectRaw}`.trim();
      };

      const afterYear = (rows) =>
        minY <= 0
          ? rows
          : rows.filter((x) => typeof x.year === "number" && x.year > 0 && x.year >= minY);

      const ownedKeys = new Set((ownedBooks || []).map(bookDiscoveryKey));
      const shelfOwnedTitleIndex = buildShelfOwnedTitleIndex(ownedBooks);
      const ownedWorkKeys = buildShelfOwnedWorkKeySet(ownedBooks);
      const pool = (ownedBooks || []).filter((b) => primaryAuthorFromBookAuthor(b.author));
      const { shelfAuthorLc, ownedTitleKeywordsLc } = shelfRecoAffinityContext(ownedBooks);

      let lists = [];

      if (rule === "title_keywords") {
        const seenKw = new Set();
        const kwsPool = [];
        const titlePool = (ownedBooks || []).slice(0, 52);
        for (const b of titlePool) {
          const kw = titleDiscoveryKeyword(b.title);
          if (!kw) continue;
          const low = kw.toLowerCase();
          if (seenKw.has(low)) continue;
          seenKw.add(low);
          kwsPool.push(kw);
          if (kwsPool.length >= 14) break;
        }
        if (!kwsPool.length) return [];
        const want = Math.min(8, kwsPool.length);
        const base = [...kwsPool];
        const rot = base.length <= want ? base : [...base.slice(rv % base.length), ...base.slice(0, rv % base.length)];
        const kws = rot.slice(0, want);
        lists = await Promise.all(
          kws.map((kw) =>
            searchOpenLibrary(withSubject(kw), 13).catch(() => [])
          )
        );
      } else {
        if (!pool.length) return [];
        const orderedDistinct = [];
        const seenAuth = new Set();
        for (const b of ownedBooks || []) {
          if (!primaryAuthorFromBookAuthor(b.author)) continue;
          const au = primaryAuthorFromBookAuthor(b.author);
          const k = au.toLowerCase();
          if (!au || seenAuth.has(k)) continue;
          seenAuth.add(k);
          orderedDistinct.push(b);
          if (orderedDistinct.length >= 40) break;
        }
        const startOff = orderedDistinct.length ? rv % orderedDistinct.length : 0;
        let seedBooks = rotateTakeFromAuthors(orderedDistinct, startOff, maxAuthors);
        if (!seedBooks.length && orderedDistinct.length) {
          seedBooks = rotateTakeFromAuthors(orderedDistinct, 0, Math.min(maxAuthors, orderedDistinct.length));
        }
        if (!seedBooks.length) return [];

        lists = await Promise.all(
          seedBooks.map(async (b) => {
            const au = primaryAuthorFromBookAuthor(b.author);
            const kw = titleDiscoveryKeyword(b.title);
            try {
              if (rule === "author_only") {
                return await searchOpenLibrary(withSubject(au), 18);
              }
              if (rule === "smart_wide") {
                const qBase = kw.length ? `${au} ${kw}` : au;
                return await searchOpenLibrarySmart(withSubject(qBase)).catch(() =>
                  searchOpenLibrary(withSubject(qBase), 14)
                );
              }
              const q = kw.length ? `${au} ${kw}` : au;
              let rows = await searchOpenLibrary(withSubject(q), 14);
              if (rows.length < 7) {
                const extra = await searchOpenLibrary(withSubject(au), 11).catch(() => []);
                rows = mergeUniqueBookLists([rows, extra]);
              }
              return rows;
            } catch {
              return [];
            }
          })
        );
      }

      if (subjectRaw) {
        const genParts = await fetchOpenLibraryGenreBranches(subjectRaw, 15);
        for (const part of genParts) lists.push(part);
      }

      let out = mergeUniqueBookLists(lists);
      await attachOpenLibraryWorkKeysToRows(out, undefined, Math.min(40, Math.max(out.length, 14)));
      out = afterYear(out);
      out = out.filter((x) =>
        !recoCandidateAlreadyOnShelf(x, shelfOwnedTitleIndex, ownedKeys, ownedWorkKeys));
      out = out.filter((x) => primaryAuthorFromBookAuthor(x.author));
      out = rankRecoByShelfAffinity(out, shelfAuthorLc, ownedTitleKeywordsLc);
      let ranked = out;
      if (ranked.length > limit) {
        const hop = rv % Math.max(1, Math.min(Math.floor(ranked.length / 3), Math.max(limit, 10)));
        ranked = [...ranked.slice(hop), ...ranked.slice(0, hop)];
      }
      return ranked.slice(0, limit);
    }

    /** Buch-Cover kleiner berechnen: schnelleres OCR/Handy weniger Arbeitsspeicher */
    async function shrinkImageBlobForOCR(blob, maxSide = 1280, quality = 0.88) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          const nw = img.naturalWidth || img.width;
          const nh = img.naturalHeight || img.height;
          if (!nw || !nh) {
            reject(new Error("Bildmaße sind nicht lesbar."));
            return;
          }
          let w = nw, h = nh;
          if (w > maxSide || h > maxSide) {
            if (w >= h) {
              h = Math.round((h * maxSide) / w);
              w = maxSide;
            } else {
              w = Math.round((w * maxSide) / h);
              h = maxSide;
            }
          }
          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          c.toBlob(
            (b) => {
              if (b) resolve(b);
              else reject(new Error("Bild konnte nicht vorbereitet werden."));
            },
            "image/jpeg",
            quality
          );
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Bild konnte nicht geöffnet werden."));
        };
        img.src = url;
      });
    }

    /** Strich-/QR-Codes auf dem Bild (ISBN-EAN wenn vorhanden) – Chrome/Android oft verfügbar */
    async function scanBarcodeISBNOnBlob(blob) {
      if (typeof BarcodeDetector === "undefined") return null;
      let bitmap = null;
      try {
        bitmap = await createImageBitmap(blob);
        const detector = new BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a"] });
        const codes = await detector.detect(bitmap);
        for (const c of codes || []) {
          const raw = String((c && c.rawValue) || "").replace(/[^\d]/g, "");
          if (raw.length >= 13) {
            const p = raw.slice(0, 13);
            if (/^97[89]\d{10}$/.test(p)) return p;
            if (/^978\d{10}$/.test(p)) return p;
          }
          const tenFromEan =
            raw.length >= 13 && raw.startsWith("978") ? raw.slice(3, 12) + raw.charAt(12) : "";
          if (/^\d{9}[\dX]$/i.test(tenFromEan)) return tenFromEan.toUpperCase();
          /* ISBN-10 Prüfziffer kann X sein — Original ggf. alphanumerisch */
          const a = String((c && c.rawValue) || "").replace(/[^\dX]/gi, "").toUpperCase();
          if (/^\d{9}X$/.test(a)) return a;
        }
      } catch (_) {
        /* Browser ohne BarcodeDetector / Fehler beim Lesen */
      }
      if (bitmap && bitmap.close) try { bitmap.close(); } catch (_) {}
      return null;
    }

    function findISBNInDigitalText(txt) {
      const d = String(txt || "").replace(/\D/g, "");
      for (let i = 0; i + 13 <= d.length; i++) {
        const s13 = d.slice(i, i + 13);
        if (/^97[89]\d{10}$/.test(s13)) return s13;
      }
      for (let j = 0; j + 10 <= d.length; j++) {
        const s10 = d.slice(j, j + 10).toUpperCase();
        if (/^\d{9}[\dX]$/.test(s10)) return s10;
      }
      return null;
    }

    function bestTitleGuessFromOCR(txt) {
      const lines = String(txt || "")
        .split(/\r?\n/)
        .map((l) => l.trim().replace(/\s+/g, " "))
        .filter((l) => l.length >= 3);
      lines.sort((a, b) => b.length - a.length);
      const pick = lines.find((l) => {
        const letters = (l.match(/[A-Za-zÄÖÜäöüßÀ-ſ]/g) || []).length;
        return letters >= 3 && letters >= Math.floor(l.replace(/\s/g, "").length * 0.12);
      });
      return (pick || lines[0] || "").slice(0, 240).trim();
    }

    /**
     * 1) Barcode/EAN wenn möglich
     * 2) Tesseract-OCR deutsch+englisch
     * 3) ISBN aus OCR oder Titel-Schätzung → Open Library
     */
    async function lookupBooksFromCoverPhoto(blob, onStatus) {
      const say = typeof onStatus === "function" ? onStatus : () => {};

      async function fetchByISBN(code) {
        const c = String(code || "").replace(/[^\dX]/gi, "").toUpperCase();
        if (c.length !== 13 && c.length !== 10) return [];
        if (c.length === 10 && !/^\d{9}[\dX]$/.test(c)) return [];
        if (c.length === 13 && !/^\d{13}$/.test(c)) return [];
        return searchOpenLibrary(`isbn:${c}`, 18, undefined, {
          resolveEditionWorkKeys: true,
          maxEditionLookups: 14,
        });
      }

      say("Strichcode wird geprüft…");
      let isbn = await scanBarcodeISBNOnBlob(blob);
      let ocrText = "";
      let list = isbn ? await fetchByISBN(isbn) : [];

      const Tess = typeof Tesseract !== "undefined" ? Tesseract : globalThis.Tesseract;

      /* Nur wenn keine Treffer vom Barcode/ISBN-Web: OCR (lädt Tesseract beim ersten Aufruf) */
      const needTesseract = !list.length;

      const canOcr = Tess && typeof Tess.recognize === "function";

      if (needTesseract && canOcr) {
        say("Texterkennung startet … (läuft im Gerät; erster Aufruf kann länger dauern)");
        const res = await Tess.recognize(blob, "deu+eng", {
          logger(m) {
            if (!m) return;
            if (m.status === "recognizing text" && typeof m.progress === "number") {
              say(`Cover-Text wird gelesen… ${Math.round(m.progress * 100)} %`);
            }
          },
        });
        const data = res && res.data;
        ocrText = data && typeof data.text === "string" ? data.text : "";
        const isbnFromOcr = findISBNInDigitalText(ocrText);
        if (isbnFromOcr) {
          isbn = isbnFromOcr;
          const byIsbn = await fetchByISBN(isbnFromOcr);
          if (byIsbn.length) list = byIsbn;
        }
        if (!list.length) {
          const guess = bestTitleGuessFromOCR(ocrText);
          if (guess.length >= 3) {
            say(`Internet-Suche nach: „${guess.slice(0, 56)}…“`);
            list = await searchOpenLibrarySmart(guess);
          }
        }
      }

      if (!canOcr && !list.length) {
        throw new Error(
          "Texterkennung (Tesseract) ist nicht geladen. Prüfen Sie das Netzwerk und laden Sie die Seite neu.",
        );
      }

      const mergedList = mergeUniqueBookLists([list]);
      await attachOpenLibraryWorkKeysToRows(mergedList, undefined, Math.min(20, mergedList.length || 14));
      return { list: mergedList, isbnUsed: isbn || null, ocrSnippet: (ocrText || "").slice(0, 520) };
    }

      if (validateSupabaseProjectConfig().length) return null;
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;

      if (!mod?.createClient) return null;
      try {
        return mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY.trim(), {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });
      } catch (e) {
        console.warn("Shelfmade: Supabase createClient failed", e);
        return null;
      }
    }

    /** Fängt Render-Fehler (z. B. nach Deploy/Edge-Cases) — nie leerer Screen */
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { err: null, info: "" };
      }
      static getDerivedStateFromError(err) {
        return { err };
      }
      componentDidCatch(err, info) {
        console.error("[Shelfmade] React ErrorBoundary", err, info);
        this.setState({ info: (info && info.componentStack) ? String(info.componentStack) : "" });
      }
      render() {
        const { err } = this.state;
        if (!err) return this.props.children;
        const msg = err && err.message ? err.message : String(err);
        return (
          <div style={{
            fontFamily:"'Crimson Pro',Georgia,serif",
            minHeight:"100vh", background:P.bg, color:P.cream,
            padding:"32px max(24px, 4vw)", boxSizing:"border-box",

            </p>

              padding:14, borderRadius:14, background:P.surfaceDark, border:`1px solid ${P.cream}15`,
              fontSize:13, color:"#ebb", wordBreak:"break-word", marginBottom:20,
            }}>{msg}</div>
            {this.state.info ? (
              <pre style={{
                fontSize:11, color:P.textDim, overflow:"auto", maxHeight:180,
                background:`${P.brickDark}`, padding:12, borderRadius:12,
              }}>{this.state.info}</pre>
            ) : null}
            <button type="button" onClick={()=>window.location.reload()} style={{

              border:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:700,

      if (typeof window === "undefined") return false;

        const hash = new URLSearchParams(hashRaw);
        const searchType = (search.get("type") || "").toLowerCase();
        const hashType = (hash.get("type") || "").toLowerCase();
        return searchType === "recovery" || hashType === "recovery";
      } catch {
        return false;

    function AuthScreen({ sb, onAuthed, toast }) {
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [showPassword, setShowPassword] = useState(false);
      const [displayName, setDisplayName] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const [forgotSent, setForgotSent] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setErr("");
        setBusy(true);
        try {
          if (mode === "forgot") {
            const redir = getAuthRedirectUrl();
            if (!redir || redir.startsWith("file:")) {
              setErr('Passwort-Link braucht eine http(s)-URL. Seite über einen kleinen Server öffnen (z. B. „Live Server“) oder in Supabase die Site-URL auf deine Online-Adresse setzen.');
              return;
            }
            const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
              redirectTo: redir,
            });
            if (error) throw error;
            setForgotSent(true);
            toast?.("Falls diese E-Mail existiert, erhältst du einen Link zum Zurücksetzen.");
          } else if (mode === "signup") {
            const { error } = await sb.auth.signUp({
              email, password,
              options: { data: { display_name: displayName.trim() || undefined } },
            });
            if (error) throw error;
            onAuthed();
          } else {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onAuthed();
          }
        } catch (x) {
          setErr(x.message || String(x));
        } finally {
          setBusy(false);
        }
      };

      const input = { width:"100%", padding:"12px 14px", borderRadius:"12px", border:`1.5px solid ${P.cream}20`,
        background:P.surfaceDark, fontSize:"15px", color:P.cream, fontFamily:"'Crimson Pro',Georgia,serif", marginBottom:"12px", outline:"none", boxSizing:"border-box" };

      const titleForgot = forgotSent ? "E-Mail verschickt" : "Passwort zurücksetzen";
      const subForgot = forgotSent

              value={email} onChange={e=>setEmail(e.target.value)}/>
            {(mode === "login" || mode === "signup") && (
              <div style={{ position:"relative", marginBottom:12 }}>
                <input

                <button

            {mode === "forgot" && !forgotSent && (
