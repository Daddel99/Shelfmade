<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelfmate – Cozy Haunted Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #6B7D6B;
      --surface: #A0523C;
      --surface-light: #B8654E;
      --surface-dark: #8B4533;
      --brick: #6B3A2E;
      --brick-dark: #4A2A1F;
      --cream: #F2E6D9;
      --cream-dark: #EDD8C8;
      --ghost: #F5E8DC;
      --ghost-pink: #F0D5C5;
      --gold: #C4A24E;
      --gold-light: #D4B05E;
      --sage: #8A9A7E;
      --sage-dark: #6B7D6B;
      --foliage: #3E5C3E;
      --foliage-light: #5A7A5A;
      --text: #F2E6D9;
      --text-muted: #D4B8A0;
      --text-dim: #A08070;
      --overlay: rgba(74,42,31,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
    }
    ::placeholder { color: var(--text-dim); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

    @keyframes ghostFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes scanMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ========================================================
       PALETTE & THEMES
    ======================================================== */
    const P = {
      bg: "#6B7D6B", surface: "#A0523C", surfaceLight: "#B8654E", surfaceDark: "#8B4533",
      brick: "#6B3A2E", brickDark: "#4A2A1F",
      cream: "#F2E6D9", creamDark: "#EDD8C8",
      ghost: "#F5E8DC", ghostPink: "#F0D5C5",
      gold: "#C4A24E", goldLight: "#D4B05E",
      sage: "#8A9A7E", sageDark: "#6B7D6B",
      foliage: "#3E5C3E", foliageLight: "#5A7A5A",
      text: "#F2E6D9", textMuted: "#D4B8A0", textDim: "#A08070",
      overlay: "rgba(74,42,31,0.7)",
    };

    const THEMES = {
      terracotta: { name: "Terracotta", accent: "#B8654E", card: "#A0523C" },
      sage:       { name: "Salbei",     accent: "#8A9A7E", card: "#6B7D6B" },
      gold:       { name: "Gold",       accent: "#D4B05E", card: "#A0523C" },
      plum:       { name: "Pflaume",    accent: "#8B6B7A", card: "#7A5A6A" },
      midnight:   { name: "Nacht",      accent: "#5A6B8A", card: "#4A5A7A" },
      forest:     { name: "Wald",       accent: "#5A7A5A", card: "#4A6B4A" },
    };

    /* ========================================================
       MOCK DATA
    ======================================================== */
    const ALL_BOOKS = [
      { id: 1, title: "Sapiens",       author: "Yuval Noah Harari", year: 2015, link: "https://amazon.de/dp/0062316117" },
      { id: 2, title: "Atomic Habits", author: "James Clear",       year: 2018, link: "https://amazon.de/dp/0735211299" },
      { id: 3, title: "Dune",          author: "Frank Herbert",     year: 1965, link: "https://amazon.de/dp/0441013597" },
      { id: 4, title: "1984",          author: "George Orwell",     year: 1949, link: "https://amazon.de/dp/0451524934" },
      { id: 5, title: "Der Prozess",   author: "Franz Kafka",       year: 1925, link: "https://amazon.de/dp/3596200377" },
      { id: 6, title: "Meditations",   author: "Marcus Aurelius",   year: 180,  link: "https://amazon.de/dp/0140449335" },
    ];

    const SEARCH_RESULTS = [
      { id: 101, title: "The Great Gatsby", author: "F. Scott Fitzgerald", year: 1925, link: "https://amazon.de/dp/0743273567" },
      { id: 102, title: "Brave New World",  author: "Aldous Huxley",       year: 1932, link: "https://amazon.de/dp/0060850523" },
      { id: 103, title: "Siddhartha",       author: "Hermann Hesse",       year: 1922, link: "https://amazon.de/dp/0553208845" },
    ];

    const USERS = [
      { id: 1, name: "Du",       username: "@du",   initials: "DU", books: [1,2,3,5], friends: [2,3,4] },
      { id: 2, name: "Lena M.",  username: "@lena",  initials: "LM", books: [2,4,6],   friends: [1,3]   },
      { id: 3, name: "Max K.",   username: "@max",   initials: "MK", books: [1,3,5],   friends: [1,2,4] },
      { id: 4, name: "Sara W.",  username: "@sara",  initials: "SW", books: [3,4,6],   friends: [1,3]   },
      { id: 5, name: "Tom B.",   username: "@tom",   initials: "TB", books: [1,2],     friends: [3]     },
    ];

    const GROUPS = [
      { id: 1, name: "Sci-Fi Lovers",     members: [1,2,3], desc: "Alles rund um Science Fiction" },
      { id: 2, name: "Philosophie Club",   members: [1,3,4], desc: "Denker & Denkerinnen" },
      { id: 3, name: "Buchclub Köln",      members: [2,4,5], desc: "Monatliches Treffen in Köln" },
    ];

    /* ========================================================
       SVG COMPONENTS
    ======================================================== */
    function Ghost({ size = 40, color = P.ghost, blush = P.ghostPink, style: s }) {
      return (
        <svg width={size} height={size} viewBox="0 0 60 66" fill="none" style={{ display:"block", ...s }}>
          <path d="M30 4C16 4 6 16 6 28v28c0 0 4-6 8-2s4 8 8 4 4-8 8-4 4 6 8 2 4-8 8-4 6 4 8 2V28C54 16 44 4 30 4z" fill={color}/>
          <ellipse cx="22" cy="28" rx="3" ry="3.5" fill={P.brickDark}/>
          <ellipse cx="38" cy="28" rx="3" ry="3.5" fill={P.brickDark}/>
          <ellipse cx="16" cy="34" rx="4" ry="2.5" fill={blush} opacity="0.5"/>
          <ellipse cx="44" cy="34" rx="4" ry="2.5" fill={blush} opacity="0.5"/>
        </svg>
      );
    }

    function Vine({ side = "left", height = 120 }) {
      const flip = side === "right" ? "scaleX(-1)" : "";
      const pts = [0.15, 0.35, 0.55, 0.75];
      return (
        <svg width="30" height={height} viewBox={`0 0 30 ${height}`} fill="none" style={{ display:"block", transform:flip, opacity:0.5 }}>
          <path d={`M15 0 C10 ${height*.2} 20 ${height*.35} 12 ${height*.5} C5 ${height*.65} 22 ${height*.8} 15 ${height}`} stroke={P.foliageLight} strokeWidth="2.5" fill="none"/>
          {pts.map((t,i) => (
            <ellipse key={i} cx={i%2===0?8:22} cy={height*t} rx="6" ry="4" fill={P.foliageLight} opacity="0.7"
              transform={`rotate(${i%2===0?-20:20} ${i%2===0?8:22} ${height*t})`}/>
          ))}
        </svg>
      );
    }

    function BookFrame({ letter, accent }) {
      return (
        <svg width="56" height="72" viewBox="0 0 56 72" fill="none" style={{ display:"block" }}>
          <rect x="2" y="2" width="52" height="68" rx="4" fill={accent||P.surfaceDark} stroke={P.goldLight} strokeWidth="2.5"/>
          <rect x="6" y="6" width="44" height="60" rx="2" fill={P.brickDark} opacity="0.3"/>
          <text x="28" y="44" textAnchor="middle" fontFamily="'Crimson Pro',Georgia,serif" fontSize="28" fontWeight="700" fill={P.cream} opacity="0.85">{letter}</text>
        </svg>
      );
    }

    function Icon({ name, size = 18, color = P.cream }) {
      const icons = {
        search:  <><circle cx="11" cy="11" r="7" stroke={color} strokeWidth="1.8" fill="none"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        plus:    <><line x1="12" y1="5" x2="12" y2="19" stroke={color} strokeWidth="1.8" strokeLinecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        x:       <><line x1="6" y1="6" x2="18" y2="18" stroke={color} strokeWidth="1.8" strokeLinecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
        book:    <><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15z" stroke={color} strokeWidth="1.8" fill="none"/></>,
        users:   <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke={color} strokeWidth="1.8" fill="none"/><circle cx="9" cy="7" r="4" stroke={color} strokeWidth="1.8" fill="none"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke={color} strokeWidth="1.8" fill="none"/></>,
        grid:    <><rect x="3" y="3" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke={color} strokeWidth="1.8" fill="none"/></>,
        camera:  <><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke={color} strokeWidth="1.8" fill="none"/><circle cx="12" cy="13" r="4" stroke={color} strokeWidth="1.8" fill="none"/></>,
        link:    <><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/></>,
        check:   <><polyline points="20 6 9 17 4 12" stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></>,
        chevron: <><polyline points="9 18 15 12 9 6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></>,
        palette: <><circle cx="13.5" cy="6.5" r="2" fill={color} opacity="0.4"/><circle cx="17.5" cy="10.5" r="2" fill={color} opacity="0.4"/><circle cx="8.5" cy="7.5" r="2" fill={color} opacity="0.4"/><circle cx="6.5" cy="12" r="2" fill={color} opacity="0.4"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.04-.23-.29-.38-.63-.38-1.04 0-.83.67-1.5 1.5-1.5H16c3.31 0 6-2.69 6-6 0-5.17-4.49-9-10-9z" stroke={color} strokeWidth="1.8" fill="none"/></>,
        trash:   <><polyline points="3 6 5 6 21 6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" stroke={color} strokeWidth="1.8" fill="none"/><path d="M10 11v6M14 11v6" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round"/></>,
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display:"block", flexShrink:0 }}>{icons[name]}</svg>;
    }

    /* ========================================================
       UI PRIMITIVES
    ======================================================== */
    function Avatar({ initials, size = 40, accent }) {
      return (
        <div style={{
          width:size, height:size, borderRadius:"50%",
          background: accent||P.brick,
          border:`2px solid ${P.goldLight}40`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:size*0.32, fontWeight:700, color:P.cream,
          fontFamily:"'Crimson Pro',Georgia,serif", flexShrink:0,
        }}>{initials}</div>
      );
    }

    function Btn({ children, variant="primary", accent, onClick, style:s, small }) {
      const [h, setH] = useState(false);
      const bg = variant==="primary" ? (accent||P.goldLight) : variant==="secondary" ? `${P.cream}15` : "transparent";
      const clr = variant==="primary" ? P.brickDark : P.cream;
      return (
        <button style={{
          padding: small?"6px 14px":"10px 20px", borderRadius:"12px",
          fontSize: small?"13px":"14px", fontWeight:600,
          fontFamily:"'Crimson Pro',Georgia,serif",
          border: variant==="secondary"?`1px solid ${P.cream}25`:"none",
          cursor:"pointer", transition:"all 0.2s ease",
          display:"inline-flex", alignItems:"center", gap:"6px",
          background:bg, color:clr,
          opacity:h?0.85:1, transform:h?"translateY(-1px)":"none", ...s,
        }} onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>
          {children}
        </button>
      );
    }

    function Modal({ onClose, title, children }) {
      return (
        <div style={{
          position:"fixed", inset:0, background:P.overlay,
          display:"flex", alignItems:"center", justifyContent:"center",
          zIndex:1000, padding:"20px",
          backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
        }} onClick={onClose}>
          <div style={{
            background:P.surface, borderRadius:"20px", padding:"28px",
            maxWidth:"500px", width:"100%",
            border:`2px solid ${P.goldLight}30`,
            boxShadow:"0 20px 60px rgba(74,42,31,0.5)",
            maxHeight:"80vh", overflowY:"auto",
          }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"24px" }}>
              <h2 style={{ fontFamily:"'Crimson Pro',Georgia,serif", fontSize:"22px", fontWeight:700, color:P.cream }}>{title}</h2>
              <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", padding:"4px" }}>
                <Icon name="x" size={18} color={P.textMuted}/>
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function Toast({ message, accent }) {
      return (
        <div style={{
          position:"fixed", bottom:"28px", left:"50%", transform:"translateX(-50%)",
          background:accent||P.foliage, color:P.cream,
          padding:"12px 24px", borderRadius:"14px",
          fontSize:"14px", fontWeight:600, zIndex:2000,
          fontFamily:"'Crimson Pro',Georgia,serif",
          boxShadow:"0 8px 32px rgba(74,42,31,0.5)",
          display:"flex", alignItems:"center", gap:"8px",
          border:`1px solid ${P.cream}20`,
        }}>
          <Ghost size={22}/> {message}
        </div>
      );
    }

    /* ========================================================
       BOOK CARD
    ======================================================== */
    function BookCard({ book, accent, cardBg, onRemove, showRemove }) {
      const [hover, setHover] = useState(false);
      const letter = book.title.charAt(0).toUpperCase();
      return (
        <div style={{
          background:cardBg||P.surfaceDark, borderRadius:"16px",
          border:`1.5px solid ${hover ? P.goldLight+"50" : P.cream+"10"}`,
          padding:"18px", position:"relative",
          transition:"all 0.25s ease",
          transform:hover?"translateY(-3px)":"none",
          boxShadow:hover?"0 8px 24px rgba(74,42,31,0.3)":"0 2px 8px rgba(74,42,31,0.15)",
        }} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
          {showRemove && hover && (
            <button onClick={e=>{e.stopPropagation();onRemove&&onRemove(book.id);}} style={{
              position:"absolute", top:8, right:8,
              background:P.brick, border:`1px solid ${P.cream}20`,
              borderRadius:"50%", width:26, height:26,
              display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer",
            }}><Icon name="trash" size={13} color="#e88"/></button>
          )}
          <BookFrame letter={letter} accent={accent}/>
          <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", fontSize:"15px", fontWeight:700, color:P.cream, marginTop:"12px", marginBottom:"2px", lineHeight:1.3 }}>
            {book.title}
          </div>
          <div style={{ fontSize:"12px", color:P.textMuted, marginBottom:"8px" }}>
            {book.author} · {book.year}
          </div>
          <a href={book.link} target="_blank" rel="noreferrer" style={{
            display:"inline-flex", alignItems:"center", gap:"4px",
            fontSize:"11px", color:P.goldLight, textDecoration:"none", fontWeight:600,
          }} onClick={e=>e.stopPropagation()}>
            <Icon name="link" size={11} color={P.goldLight}/> Link
          </a>
        </div>
      );
    }

    /* ========================================================
       ADD BOOK MODAL
    ======================================================== */
    function AddBookModal({ onClose, onAddBook, accent }) {
      const [tab, setTab] = useState("search");
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [scanning, setScanning] = useState(false);
      const [scanResult, setScanResult] = useState(null);

      const handleSearch = () => {
        if (!query.trim()) return;
        const q = query.toLowerCase();
        const found = SEARCH_RESULTS.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q));
        setResults(found.length>0?found:SEARCH_RESULTS);
      };

      const handleScan = () => {
        setScanning(true); setScanResult(null);
        setTimeout(()=>{ setScanning(false); setScanResult(SEARCH_RESULTS[Math.floor(Math.random()*SEARCH_RESULTS.length)]); }, 2200);
      };

      const inputStyle = {
        width:"100%", padding:"10px 14px 10px 38px", borderRadius:"12px",
        border:`1.5px solid ${P.cream}20`, background:P.surfaceDark,
        fontSize:"14px", outline:"none", boxSizing:"border-box",
        fontFamily:"'Crimson Pro',Georgia,serif", color:P.cream,
      };

      return (
        <Modal onClose={onClose} title="Buch hinzufügen">
          <div style={{ display:"flex", gap:"3px", padding:"3px", background:P.surfaceDark, borderRadius:"14px", marginBottom:"24px" }}>
            {[{id:"search",label:"Suche",icon:"search"},{id:"camera",label:"Foto-Scan",icon:"camera"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                flex:1, padding:"9px", borderRadius:"11px", fontSize:"13px", fontWeight:600,
                background:tab===t.id?P.surface:"transparent",
                color:tab===t.id?P.cream:P.textMuted,
                border:tab===t.id?`1px solid ${P.cream}15`:"1px solid transparent",
                cursor:"pointer", transition:"all 0.2s",
                fontFamily:"'Crimson Pro',Georgia,serif",
                display:"flex", alignItems:"center", justifyContent:"center", gap:"6px",
              }}>
                <Icon name={t.icon} size={14} color={tab===t.id?P.cream:P.textMuted}/> {t.label}
              </button>
            ))}
          </div>

          {tab==="search" && (
            <>
              <div style={{ display:"flex", gap:"8px", marginBottom:"20px" }}>
                <div style={{ flex:1, position:"relative" }}>
                  <div style={{ position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)" }}>
                    <Icon name="search" size={15} color={P.textDim}/>
                  </div>
                  <input style={inputStyle} placeholder="Titel oder Autor…" value={query}
                    onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSearch()}/>
                </div>
                <Btn accent={accent} onClick={handleSearch}>Suchen</Btn>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {results.map(b=>(
                  <div key={b.id} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"12px 14px", borderRadius:"14px", background:P.surfaceDark,
                    border:`1px solid ${P.cream}10`,
                  }}>
                    <div>
                      <div style={{ fontSize:"14px", fontWeight:700, color:P.cream, fontFamily:"'Crimson Pro',Georgia,serif" }}>{b.title}</div>
                      <div style={{ fontSize:"12px", color:P.textMuted }}>{b.author} · {b.year}</div>
                    </div>
                    <Btn accent={accent} small onClick={()=>{onAddBook(b);onClose();}}>
                      <Icon name="plus" size={13} color={P.brickDark}/> Hinzufügen
                    </Btn>
                  </div>
                ))}
              </div>
            </>
          )}

          {tab==="camera" && (
            <div style={{ textAlign:"center" }}>
              <div onClick={handleScan} style={{
                width:"100%", height:"200px", borderRadius:"16px",
                background:P.surfaceDark, border:`2px dashed ${P.cream}20`,
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center",
                cursor:"pointer", transition:"all 0.2s",
              }}>
                {scanning ? (
                  <>
                    <Ghost size={44} style={{ marginBottom:"12px", animation:"ghostFloat 1.5s ease-in-out infinite" }}/>
                    <div style={{ fontSize:"13px", color:P.textMuted }}>Geist analysiert das Buch…</div>
                    <div style={{ width:"100px", height:"3px", background:P.brick, borderRadius:"2px", marginTop:"12px", overflow:"hidden" }}>
                      <div style={{ width:"40%", height:"100%", background:P.goldLight, borderRadius:"2px", animation:"scanMove 1.5s ease-in-out infinite" }}/>
                    </div>
                  </>
                ) : scanResult ? (
                  <>
                    <Icon name="check" size={28} color={P.foliageLight}/>
                    <div style={{ fontWeight:700, fontSize:"16px", marginTop:"10px", color:P.cream }}>{scanResult.title}</div>
                    <div style={{ fontSize:"13px", color:P.textMuted }}>{scanResult.author}</div>
                  </>
                ) : (
                  <>
                    <Icon name="camera" size={32} color={P.textDim}/>
                    <div style={{ color:P.textMuted, fontSize:"14px", marginTop:"10px" }}>Foto simulieren</div>
                    <div style={{ color:P.textDim, fontSize:"12px", marginTop:"2px" }}>KI erkennt das Buch automatisch</div>
                  </>
                )}
              </div>
              {scanResult && (
                <Btn accent={accent} onClick={()=>{onAddBook(scanResult);onClose();}} style={{ marginTop:"16px" }}>Hinzufügen</Btn>
              )}
            </div>
          )}
        </Modal>
      );
    }

    /* ========================================================
       PROFILE PAGE
    ======================================================== */
    function ProfilePage({ user, books, accent, cardBg, onRemoveBook, onOpenAdd, themeKey, onSetTheme }) {
      return (
        <div style={{ maxWidth:"860px", margin:"0 auto", padding:"36px 24px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"18px", marginBottom:"36px" }}>
            <div style={{ position:"relative" }}>
              <Avatar initials={user.initials} size={64} accent={accent}/>
              <Ghost size={24} style={{ position:"absolute", top:-8, right:-10 }}/>
            </div>
            <div>
              <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, letterSpacing:"-0.3px" }}>{user.name}</h1>
              <p style={{ fontSize:"14px", color:P.textMuted }}>
                {user.username} · {user.books.length} Bücher · {user.friends.length} Freunde
              </p>
            </div>
          </div>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"18px" }}>
            <h2 style={{ fontSize:"20px", fontWeight:700, color:P.cream }}>Meine Bücher</h2>
            <Btn accent={accent} onClick={onOpenAdd}><Icon name="plus" size={14} color={P.brickDark}/> Hinzufügen</Btn>
          </div>

          {books.length===0 ? (
            <div style={{ textAlign:"center", padding:"50px 20px" }}>
              <Ghost size={56} style={{ margin:"0 auto 12px" }}/>
              <p style={{ color:P.textDim }}>Dein Regal ist leer – füge dein erstes Buch hinzu.</p>
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"14px", marginBottom:"40px" }}>
              {books.map(b=><BookCard key={b.id} book={b} accent={accent} cardBg={cardBg} showRemove onRemove={onRemoveBook}/>)}
            </div>
          )}

          {/* Theme Picker */}
          <div style={{ padding:"22px 24px", borderRadius:"18px", background:P.surfaceDark, border:`1px solid ${P.cream}10`, marginBottom:"20px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"14px" }}>
              <Icon name="palette" size={17} color={P.textMuted}/>
              <span style={{ fontSize:"15px", fontWeight:700, color:P.cream }}>Akzentfarbe</span>
            </div>
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap" }}>
              {Object.entries(THEMES).map(([key,t])=>(
                <button key={key} onClick={()=>onSetTheme(key)} title={t.name} style={{
                  width:"38px", height:"38px", borderRadius:"50%",
                  background:t.accent, cursor:"pointer",
                  border:themeKey===key?`3px solid ${P.cream}`:"3px solid transparent",
                  outline:themeKey===key?`2px solid ${t.accent}60`:"none",
                  outlineOffset:"2px", transition:"all 0.2s",
                  boxShadow:"0 2px 8px rgba(0,0,0,0.2)",
                }}/>
              ))}
            </div>
          </div>

          <div style={{ padding:"16px 20px", borderRadius:"14px", background:P.surfaceDark, border:`1px solid ${P.cream}08`, fontSize:"12px", color:P.textDim, lineHeight:1.8 }}>
            <span style={{ fontWeight:700, textTransform:"uppercase", letterSpacing:"0.8px", fontSize:"10px" }}>Infrastruktur</span><br/>
            <span style={{ color:P.textMuted }}>DynamoDB · S3 · Cognito · Lambda · API Gateway</span>
          </div>
        </div>
      );
    }

    /* ========================================================
       FRIENDS PAGE
    ======================================================== */
    function FriendsPage({ currentUser, allUsers, allBooks, accent, cardBg }) {
      const [viewUser, setViewUser] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const friends = allUsers.filter(u=>currentUser.friends.includes(u.id));
      const nonFriends = allUsers.filter(u=>u.id!==currentUser.id && !currentUser.friends.includes(u.id));

      return (
        <div style={{ maxWidth:"860px", margin:"0 auto", padding:"36px 24px" }}>
          <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, marginBottom:"4px" }}>Freunde</h1>
          <p style={{ fontSize:"14px", color:P.textMuted, marginBottom:"24px" }}>{friends.length} Freunde</p>

          <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"24px" }}>
            {friends.map(f=>(
              <div key={f.id} onClick={()=>setViewUser(f)} style={{
                display:"flex", alignItems:"center", gap:"14px",
                padding:"14px 18px", borderRadius:"16px",
                background:P.surfaceDark, border:`1px solid ${P.cream}10`,
                cursor:"pointer", transition:"all 0.2s",
              }}>
                <Avatar initials={f.initials} size={42} accent={accent}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"15px", fontWeight:700, color:P.cream }}>{f.name}</div>
                  <div style={{ fontSize:"12px", color:P.textMuted }}>{f.username} · {f.books.length} Bücher</div>
                </div>
                <Icon name="chevron" size={16} color={P.textDim}/>
              </div>
            ))}
          </div>

          <Btn variant="secondary" onClick={()=>setShowAdd(true)}>
            <Icon name="plus" size={14}/> Freunde finden
          </Btn>

          {showAdd && (
            <Modal onClose={()=>setShowAdd(false)} title="Freunde finden">
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {nonFriends.length===0 ? (
                  <p style={{ textAlign:"center", color:P.textDim, padding:"20px" }}>Alle sind schon deine Freunde.</p>
                ) : nonFriends.map(u=>(
                  <div key={u.id} style={{
                    display:"flex", alignItems:"center", gap:"14px",
                    padding:"12px 14px", borderRadius:"14px", background:P.surfaceDark,
                  }}>
                    <Avatar initials={u.initials} size={38} accent={accent}/>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:"14px", fontWeight:700, color:P.cream }}>{u.name}</div>
                      <div style={{ fontSize:"12px", color:P.textMuted }}>{u.username}</div>
                    </div>
                    <Btn accent={accent} small>Hinzufügen</Btn>
                  </div>
                ))}
              </div>
            </Modal>
          )}

          {viewUser && (
            <Modal onClose={()=>setViewUser(null)} title={viewUser.name}>
              <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"24px" }}>
                <Avatar initials={viewUser.initials} size={48} accent={accent}/>
                <div>
                  <div style={{ fontWeight:700, color:P.cream }}>{viewUser.name}</div>
                  <div style={{ fontSize:"13px", color:P.textMuted }}>{viewUser.username}</div>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"12px" }}>
                {viewUser.books.map(bid=>{
                  const b=allBooks.find(bk=>bk.id===bid);
                  return b?<BookCard key={b.id} book={b} accent={accent} cardBg={cardBg}/>:null;
                })}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ========================================================
       GROUPS PAGE
    ======================================================== */
    function GroupsPage({ currentUser, allUsers, allGroups, allBooks, accent, cardBg }) {
      const [viewGroup, setViewGroup] = useState(null);
      const [showCreate, setShowCreate] = useState(false);

      const groupBooks = (g) => {
        const ids = new Set();
        g.members.forEach(mid=>{ const u=allUsers.find(u=>u.id===mid); if(u) u.books.forEach(bid=>ids.add(bid)); });
        return allBooks.filter(b=>ids.has(b.id));
      };

      const inputStyle = {
        width:"100%", padding:"10px 14px", borderRadius:"12px",
        border:`1.5px solid ${P.cream}15`, background:P.surfaceDark,
        fontSize:"14px", outline:"none", boxSizing:"border-box",
        fontFamily:"'Crimson Pro',Georgia,serif", color:P.cream,
      };

      return (
        <div style={{ maxWidth:"860px", margin:"0 auto", padding:"36px 24px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"24px" }}>
            <div>
              <h1 style={{ fontSize:"28px", fontWeight:700, color:P.cream, marginBottom:"4px" }}>Gruppen</h1>
              <p style={{ fontSize:"14px", color:P.textMuted }}>Teile & entdecke Bücher</p>
            </div>
            <Btn accent={accent} onClick={()=>setShowCreate(true)}>
              <Icon name="plus" size={14} color={P.brickDark}/> Neue Gruppe
            </Btn>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"14px" }}>
            {allGroups.map(g=>{
              const isMember = g.members.includes(currentUser.id);
              return (
                <div key={g.id} onClick={()=>setViewGroup(g)} style={{
                  background:P.surfaceDark, borderRadius:"18px",
                  border:`1px solid ${P.cream}10`,
                  padding:"22px", cursor:"pointer", transition:"all 0.2s",
                }}>
                  <h3 style={{ fontSize:"17px", fontWeight:700, color:P.cream, marginBottom:"4px" }}>{g.name}</h3>
                  <p style={{ fontSize:"12px", color:P.textMuted, marginBottom:"16px" }}>{g.desc}</p>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontSize:"11px", fontWeight:600, color:P.goldLight, background:`${P.goldLight}15`, padding:"4px 10px", borderRadius:"8px" }}>
                      {g.members.length} Mitglieder
                    </span>
                    {isMember ? (
                      <span style={{ fontSize:"12px", color:P.foliageLight, fontWeight:600, display:"flex", alignItems:"center", gap:"4px" }}>
                        <Icon name="check" size={13} color={P.foliageLight}/> Dabei
                      </span>
                    ) : (
                      <Btn accent={accent} small onClick={e=>e.stopPropagation()}>Beitreten</Btn>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {viewGroup && (
            <Modal onClose={()=>setViewGroup(null)} title={viewGroup.name}>
              <p style={{ fontSize:"13px", color:P.textMuted, marginBottom:"20px" }}>{viewGroup.desc}</p>
              <span style={{ fontSize:"10px", fontWeight:700, color:P.textDim, textTransform:"uppercase", letterSpacing:"0.8px" }}>Mitglieder</span>
              <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginTop:"8px", marginBottom:"20px" }}>
                {viewGroup.members.map(mid=>{
                  const u=allUsers.find(u=>u.id===mid);
                  return u?(
                    <div key={u.id} style={{ display:"flex", alignItems:"center", gap:"6px", padding:"4px 10px 4px 4px", background:P.surfaceDark, borderRadius:"20px", fontSize:"12px", color:P.cream }}>
                      <Avatar initials={u.initials} size={22} accent={accent}/> {u.name}
                    </div>
                  ):null;
                })}
              </div>
              <span style={{ fontSize:"10px", fontWeight:700, color:P.textDim, textTransform:"uppercase", letterSpacing:"0.8px" }}>Alle Bücher</span>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"12px", marginTop:"10px" }}>
                {groupBooks(viewGroup).map(b=><BookCard key={b.id} book={b} accent={accent} cardBg={cardBg}/>)}
              </div>
            </Modal>
          )}

          {showCreate && (
            <Modal onClose={()=>setShowCreate(false)} title="Neue Gruppe">
              <div style={{ display:"flex", flexDirection:"column", gap:"16px" }}>
                <div>
                  <label style={{ fontSize:"12px", color:P.textMuted, display:"block", marginBottom:"6px" }}>Name</label>
                  <input style={inputStyle} placeholder="z.B. Fantasy Fans"/>
                </div>
                <div>
                  <label style={{ fontSize:"12px", color:P.textMuted, display:"block", marginBottom:"6px" }}>Beschreibung</label>
                  <input style={inputStyle} placeholder="Worum geht es?"/>
                </div>
                <div>
                  <label style={{ fontSize:"12px", color:P.textMuted, display:"block", marginBottom:"8px" }}>Einladen</label>
                  <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                    {allUsers.filter(u=>u.id!==currentUser.id).map(u=>(
                      <Btn key={u.id} variant="secondary" small>{u.name}</Btn>
                    ))}
                  </div>
                </div>
                <Btn accent={accent}>Erstellen</Btn>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ========================================================
       MAIN APP
    ======================================================== */
    function App() {
      const [page, setPage] = useState("profile");
      const [themeKey, setThemeKey] = useState("terracotta");
      const [showAddBook, setShowAddBook] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [userBooks, setUserBooks] = useState([...USERS[0].books]);

      const theme = THEMES[themeKey];
      const currentUser = { ...USERS[0], books: userBooks };
      const resolvedBooks = userBooks.map(id=>ALL_BOOKS.find(b=>b.id===id)).filter(Boolean);
      const allBooks = [...ALL_BOOKS, ...SEARCH_RESULTS];

      const showToast = (msg) => { setToastMsg(msg); setTimeout(()=>setToastMsg(null), 2400); };
      const addBook = (book) => {
        if (!userBooks.includes(book.id)) {
          setUserBooks(prev=>[...prev, book.id]);
          if (!ALL_BOOKS.find(b=>b.id===book.id)) ALL_BOOKS.push(book);
          showToast(`${book.title} hinzugefügt`);
        }
      };
      const removeBook = (id) => { setUserBooks(prev=>prev.filter(i=>i!==id)); showToast("Buch entfernt"); };

      const navItems = [
        { id:"profile", label:"Regal",   icon:"book" },
        { id:"friends", label:"Freunde", icon:"users" },
        { id:"groups",  label:"Gruppen", icon:"grid" },
      ];

      return (
        <div style={{ fontFamily:"'Crimson Pro',Georgia,serif", background:P.bg, color:P.cream, minHeight:"100vh", position:"relative" }}>

          {/* Decorative vines */}
          <div style={{ position:"fixed", top:60, left:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="left" height={200}/></div>
          <div style={{ position:"fixed", top:100, right:0, zIndex:0, opacity:0.4, pointerEvents:"none" }}><Vine side="right" height={160}/></div>
          <div style={{ position:"fixed", bottom:0, left:10, zIndex:0, opacity:0.3, pointerEvents:"none" }}><Vine side="left" height={140}/></div>

          {/* Nav */}
          <nav style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"0 28px", height:"56px",
            background:`${P.surface}E8`, backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
            borderBottom:`1px solid ${P.cream}10`,
            position:"sticky", top:0, zIndex:100,
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
              <Ghost size={26}/>
              <span style={{ fontSize:"18px", fontWeight:800, color:P.cream, letterSpacing:"-0.3px" }}>Shelfmate</span>
            </div>
            <div style={{ display:"flex", gap:"2px" }}>
              {navItems.map(n=>(
                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                  padding:"7px 16px", borderRadius:"10px",
                  fontSize:"14px", fontWeight:page===n.id?700:400,
                  color:page===n.id?P.cream:P.textMuted,
                  background:page===n.id?`${P.cream}12`:"transparent",
                  border:"none", cursor:"pointer", transition:"all 0.2s",
                  fontFamily:"'Crimson Pro',Georgia,serif",
                  display:"flex", alignItems:"center", gap:"6px",
                }}>
                  <Icon name={n.icon} size={15} color={page===n.id?P.cream:P.textMuted}/> {n.label}
                </button>
              ))}
            </div>
            <Avatar initials="DU" size={32} accent={theme.accent}/>
          </nav>

          {/* Content */}
          <div style={{ position:"relative", zIndex:1 }}>
            {page==="profile" && (
              <ProfilePage user={currentUser} books={resolvedBooks}
                accent={theme.accent} cardBg={theme.card}
                onRemoveBook={removeBook} onOpenAdd={()=>setShowAddBook(true)}
                themeKey={themeKey} onSetTheme={setThemeKey}/>
            )}
            {page==="friends" && (
              <FriendsPage currentUser={currentUser} allUsers={USERS} allBooks={allBooks}
                accent={theme.accent} cardBg={theme.card}/>
            )}
            {page==="groups" && (
              <GroupsPage currentUser={currentUser} allUsers={USERS} allGroups={GROUPS} allBooks={allBooks}
                accent={theme.accent} cardBg={theme.card}/>
            )}
          </div>

          {showAddBook && <AddBookModal onClose={()=>setShowAddBook(false)} onAddBook={addBook} accent={theme.accent}/>}
          {toastMsg && <Toast message={toastMsg} accent={theme.accent}/>}

          {/* Floating ghost */}
          <div style={{ position:"fixed", bottom:12, right:16, zIndex:50, opacity:0.6, pointerEvents:"none", animation:"ghostFloat 3s ease-in-out infinite" }}>
            <Ghost size={36}/>
          </div>
        </div>
      );
    }

    /* ========================================================
       RENDER
    ======================================================== */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
